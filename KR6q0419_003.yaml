body:
  text: 侍者傳善輯拈古陳操尚書一日齊僧躬自行餅一僧展手擬接公卻縮手僧無語公曰果然果然又問僧有個事與上座商量得麼曰合取狗口公自摑口曰某甲罪過僧曰知過必改公曰就闍黎乞取口喫飯得麼一日同衆官登樓次見數僧行過一官人曰來者總是行腳僧公曰不是曰焉知不是公曰待近來與勘過及僧至樓前公驀召上座僧皆舉首公曰不信道拈曰陳尚書之機辨峻比雲門辣似睦州蓋從二師處得來故縱奪臨時殺活自在真宗門入作所以下刃最緊也還識尚書麼電火難追影風雷莫辨真韓文公問大顛云云拈曰首座眼親顛師手快一般抵對佛法妙在見幾而作據款結案也是正令當行不為屈棒文公猶是俗漢當時若開眼未免傍觀拍掌還知大顛打首座意麼翻雲全在我覆雨更繇誰高仲貽太傅參芙蓉楷禪師蓉令去其所重扣已而參一日忽造微密呈偈曰懸崖撒手任縱橫大地虛空自坦平照壑耀巖不借月菴頭別有一簾明拈曰此老所詣處坦夷明白可謂山河大地不礙眼光若要擺手過漳江更須撤卻簾兒相見始得假如相見時如何家庭才轉步道路又分攜洪州許刺史式一日與泐潭澄上藍溥坐次潭問聞郎中道夜坐連雲石春栽帶雨松當時答洞山甚麼話公曰今日放衙早潭曰聞答泗洲大聖在楊州出現底是否公曰別點茶來潭曰名不虛傳公曰和尚早晚回山潭曰今日被上藍覷破藍便喝潭曰須是你始得公曰不奈船何打破戽斗拈曰賊來須趁客來須待一個引玉拋磚一個埋兵掉鬥無端殃及上藍真個是不奈船何打破戽斗要識三大老面目麼琵琶隨手撥簫鼓應時鳴黃山谷居士初好作艷詞得圓通秀禪師激發遂悔過絶筆後參晦堂因聞木樨香釋然拈曰吾無隱乎爾桂子月中落爾無隱乎我天香雲外飄山谷不遇晦堂鼻孔撩天搊他不住雖然薦得些子爭奈腳跟紅線猶未斷在何也路頭才撞入關鎖轉難通山谷居士因謁死心禪師隨衆入室心見張目問曰新長老死學士死燒作兩堆灰向甚麼處相見公無語心約出曰晦堂處參得底使未著在後左官黔南道力愈勝於無思念中頃明死心所問報以書曰往年嘗蒙苦口提攜長如醉夢依稀在光影中蓋疑情不盡命根不斷故望崖而退耳謫官在黔南道中晝臥覺來忽爾尋思被天下老和尚謾了多少惟有死心道人不肯乃是第一相為也拈曰鐵面去皮晦堂析肉死心又敲骨出髓矣山谷居士悟入深奧得三尊宿爐韝之力也秪如疑情盡命根斷死心道人還肯他也未鐵壁從渠透銀山更要通寺丞戴中孚咨扣靈源一日有省以偈呈清禪師曰杳冥源底全機處一片心花露印紋知是幾生曾供養時時微笑動香雲拈曰窮源見底燦露一片心花微笑破顏知是多生供養果然穩當頭尾完全若要撒得開捏得聚須更窮盡變化始得左丞范致虛繇翰苑守豫章過圓通謁旻禪師茶罷曰某行將老矣隨在金紫行中去此事稍遠通召內翰公應諾通曰何遠之有公躍然曰乞師再垂指誨通曰此去洪都有四程公佇思通曰見即便見擬思即差公乃豁然有省拈曰圓通老人可謂有囊中妙藥能起死回生在頃刻耳今宗師家未嘗施此國手便謂外護沉痼莫療不亦冤哉左丞雖於此省入去此事不遠爭奈鄉音猶易識家國尚茫然尚書莫少虛因宦遊西蜀謁南堂靜禪師咨決心要堂使向公案上提撕無所入適如廁忽聞穢氣急以手掩鼻遂有省即呈偈曰從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來元在鼻尖頭堂印之拈曰萬別千差無覓處得來元在鼻尖頭雖是苦心造到簡點將來猶帶些穢氣在何故為他向廁坑頭著到凌行婆問浮杯因緣拈曰凌行婆具超方作略語句驚人雖趙州古佛亦讓一籌諸尊宿盡不奈伊何倒被浮杯老人不動干戈捉敗者老魔魅了也且道何人為證乃以手捶胸曰蒼天婆子燒菴拈曰婆子燒菴卻與阿師添些光彩阿師被趁倒會勘破婆子家風且道在甚麼處勘破婆子遂合掌云謝供養一婆子令人送錢與趙州請轉藏拈曰婆子送錢轉經起動高年老宿趙州下床繞匝不孤施主好心分明全藏掀翻卻道秪轉一半且道那半藏落在何處任從黃葉落不與止啼錢頌古趙州無字趙州無字漫天網蝦鱉魚龍一口吞問取大唐人不會新羅夜半放僧參趙州問大死的人十萬里鵬才展翅一千年鶴便翱翔到家底事人難會不涉程途用果長趙州勘婆子魔王手裏追魔印展也何曾露出來不是腳跟紅線斷臺山之路滑如苔船子藏身笙歌院裏低昂舞錦字梭房宛轉看近日洞庭秋水滿古帆風便過千灣婆子燒菴婆子燒菴菴愈好海中紅焰爍天高目前秪要添些子向後從他怨寂寥南泉白牯生佛齊通一鼻風都來吸盡不同同狸奴白牯超方後坐斷山頭一段空忠國師三喚侍者重重提出摩尼寶晶光獨露更非他養子雖是婆心切怎奈當機錯過多臨濟三頓棒金剛寶劍用非常截斷廉纖露本光莫言佛法無多子者個從來絶論量趙州喫茶去逄人只是者杯茶虛空澆濕眉毛皺喫著若能知味者必然空裏翻筋斗靈雲見桃花靈雲偶中桃花毒玄沙善用蓋頭機若無把定乾坤手金毛獅子變狐啼德山托鉢越格超方用不同節節生機活似龍千聖不傳末後句任是巖頭也莫窮贊聞谷大師贊行雲流水不留蹤垂老千山策瘦笻歸到破陶菴裏坐一雙冷眼勘蛇龍博山和尚贊這尊慈拈穿膽之鋒無機不透旋曜眼之鏡過物即彰一片熱腸愛兒孫敲冰浴火十分勝氣與佛祖奪格換機眉毛忒粗老胡僧也須壓倒手段極辣諸尊宿立在下風奮雄辨則雷振風飛魔外莫不喪氣摧異見則刀開斧劈疑難頃爾冰消接伶俐漢滿口含糊對生盲人一腔明白當初未遇剛求見今日相逄不欲親何故如此險機暗用常擔版毒口才開便鑠金偈禪鏡偈有序大圓鏡裏說個禪字早是痕生況又說許多禪病曲折出來明眼人前反添搕𢶍大都參學者流決擇不精非證道眼料簡不明混同魔異所以禪鏡之作不得已有一腔熱腸聊為後學贈點眼之方若云制之一處無事不辦只消一句話頭不起第二念則此種種指示誠為制字下注腳耳然秦宮玉鏡照人肝膽牛渚犀光洞怪隱狀去聖時遙宗門流弊敗闕不可勝言誾上座眼不耐見將此一柄禿掃帚向少林庭下從新打疊一回當時達磨大師面壁嵩山掉落個影子在熊耳峰前或有人撈摸得著描寫將來使祖道重光不亦幸乎若作實法綴人寧可付之丙丁童子不欲令好眼著屑耳參禪不痛切生死何時決輕拋分寸陰眼裏流生血世念冷如灰心腸剛似鐵拼命直前行到家有時節參禪不苦志安能做到底不為戀殘軀便是恣懶意嚼出苦中甜參到難處易能知哲侍者方稱鐵漢子參禪不猛利優游成鈍滯道力莫能充病根拔不起勢若破重圍雄心須奮厲做個大闡提舌根藏口裏參禪不耐久性喜狂奔走牽挂寸絲頭分明業鬼誘不做死冤家魔王焉授首香林四十年一片方打就參禪不綿密話頭長打失斯須豈可離晝夜無間隙一念如萬年千朝同一日無孔生鐵鎚捏出黃金汁參禪不徑挺骨格非中正為人必泛常作事徇情境氣概要剛方志意須堅硬昂藏大丈夫佛祖聽號令參禪不著意莽蕩無成褫邋遢似神仙疏散學高士大理既未明喻如喪考妣不到大脫空逍遙誰許你參禪念頭雜多慮心難遏才覺話頭來又遭岐路奪轉變志不常欲死機偏活除是一條心真疑方頓發參禪學心在難捨佛法愛不是戀詞章便為求知解運糞污心田刳龜圖靈怪直饒廣博通拋家猶走外參禪多執著執著翻成錯大道理虛玄無繩君自縛手段要翻騰胸次須寬擴急促入邪魔多因此病作參禪著機境眼眚花翻影百怪與千奇都是識心病急須顧本參不可戀光影門外打野榸路頭恐不正參禪執情解強作道理會三枚信口猜隔靴搔癢在如燈影裏行被葛藤椿礙斬釘截鐵人不缺他家債參禪心枯槁喜沉不喜掉如堅冰夾魚似巨石壓草冷浸死水裏忘卻長安道澄潭舞毒龍好把蒼波攪參禪帶狂妄腳跟不穩當口舌要爭強見處成鹵莽破除潦草心制死浮躁想一味放平懷自然銷業障參禪帶習氣憎愛心難治生死根不除惡作機常起熟境變教生活蛇弄得死識破不為冤轉變成大智參禪氣量窄觸境動聲色煩惱火燒天無明雲潑墨德性缺雍容詞氣多忙迫小節忍不來大悟何超豁參禪無實地虛頭弄到底門面愛裝花腳跟那點地逄人恣談禪開口便成偈線斷傀儡時方知是鬼戲參禪似兒戲顛倒心難制觸境便隨流律身忘禁忌爛泥不上壁醉漢長倒地惟願痛加鞭牢拴牯牛鼻參禪沒結局短販隨流俗製衣轉為裳彈琴不終曲圖他小歇場享箇便宜福下稍如此流路遙知馬足參禪去藥忌心病休增熾乘言喪本宗滯句迷玄旨法愛不關情悟來亦無意如過蠱毒鄉莫沾滴水味參禪要起疑疑與悟為師如墜求離井似燒急救眉路頭諳入處箍底爆開時一句無多子芭蕉剝盡皮參禪落思議總屬識心意分別起支捂摶量摸影子不解剝芭蕉卻添駢拇指注腳總分明已落第二義參禪心憤發便有好機括如人惡發時放火將人殺毒氣既攻心命根應倒拔莫學死貓兒捕鼠眼睜煞參禪信得及休向外邊覓若真師子兒豈喫殘羹汁成佛不繇他如何黑似漆立地便承當一門超直入參禪要師友痛處加針灸冶就巧模成璞待良工剖不是明眼人錐劄徒生受切磋與琢磨親炙還須久參禪願力堅鐵壁拶教穿誓死無移志捐生尚勉旃求深應遂意理極自忘筌鐵杵成針日香飄果熟天參禪休自畫秪要加鞭策莫愁半路艱毋慮前途窄根器誰不如悟來焉可測拼個兩三生定然要明白參禪助發機聲色不須離竹擊曾因悟桃開尚破疑圓通從此證普眼頗相宜不二門開處花紅鳥亂啼參禪須明理理即法身是毫釐有差殊白雲千萬里寶鏡徹無疑金屑眼成翳直下便承當何容生擬議參禪不執是是與非何異不但諍空言抑且昧真理師子解翻身犛牛偏愛尾打破是非關是非裏游戲參禪不怕錯妙在自知過一句絶狐疑無可無不可打正貴因邪欲補先撲破靈符到手時造命都由我參禪要質直虛僞成何益面貌賽春風胸次饒荊棘諂曲非道情粉飾壞本色因地心不真果位成迂僻參禪宜淡泊嗜好天真鑠清虛理易明滓穢神俱濁瓔珞粥可餐橘皮湯好瀹咬破鐵蒺藜法味怡神樂參禪行門辦先哲為龜鑑添石負雲舂栽田博茶飯臨濟自持盂雪峰躬典爨受用不知艱終愧汗血漢參禪有作略智力能恢廓轉變不尋常妙用自揮霍縱奪順機宜殺活臨時作如遇國手棋別有超方著參禪妙兼帶偏正融相礙針線巧安排脈絡相通會交羅珠網光回互綺生彩節拍妙相應卷舒大自在參禪要打徹淆訛都勦絶言句盡疑通宗趣善分別穿過險關津拔卻閒釘楔千了百當人萬機流可截參禪要操履步步踏實地事理貴雙融矛盾即不是途中好善為家業從新起拈起一毛頭都有西來意參禪知因果動念休差錯修證即不無污染即不可還他淨白心簡點纖毫過莫論野狐禪不脫亦不墮參禪要得妙隨機成善巧過水那濕腳解走不觸道閒穿花柳叢笑聽琵琶調還他了事人七顛仍八倒和白毫菴偈有序余讀相國二水居士菴居詩百首其吐詞不帶煙火脫去筌蹄妙撥無思關捩居士乃親作小楷寄余年高興逸筆法精絶余固寶為眉山之帶留鎮三門因步韻賡和以綴其末大似投橘報李不善獻酬博居士一笑可也石筍倒抽緑竹豆棚忽引瓜藤問我屬何緣故釋迦傳自然燈不在昂如孤鶴何言泛若輕鷗縱到回機地步鵝湖笑人逼浮都有一條坐具無煩借座燈王穿過魚庖酒肆展開佛國道場胸次未銷磊落縱然好事不佳真個了無憎愛心如臘月蓮花烏兔何嘗運轉虛空那怕消磨無字碑文難打石人壁上摩娑出門笑渠落草回途見我家山六月峨眉千丈倩誰移在雪關泉眼水流接筧石邊筍迸成鞭一飽頓忘百味三竿猶恣酣眠竹徑夏憐蔽日茅堂冬愛迎陽脫得汗衫乾淨風吹荷芰衣涼鬧市叢中合伴剎竿頭上翻身雖然無縛無脫何妨繇我繇人截鶴續鳧信手移花接木隨緣鐵杵成針有日針成鐵杵何年罵坐通身是膽唾面一忍如灰靜多生習氣善用吻合本來妙翅摩交遠漢驪龍吸盡寒淵丸弄虛空萬象大都率我天然問道如盲見日涉世無風起波聰明不了生死甘心受拷閻羅歷劫算來片晷大千輥入戲場解脫門門可入牽渠不肯還鄉鵬舉依然控地鶴沖宛在庭中親見德雲面目須彌不隔別峰筋斗且從人打傀儡看是誰抽底蘊盡情勘破成魔作佛自繇竹杖旋紋有節芒鞋綻底多年分甚剎那億劫一貫原是千錢精衛填河難滿烏鵲跨橋欲周解省些兒心力還他看象截流山色面門指示溪聲耳畔叮嚀返顧不曾移步果然親到祖庭磬折逄迎有禮泛應曲當無心斸斷井藤百尺接起崖樹千尋受用千波百挈相忘爾寂我惺解鐫石頭作佛試問那竅不靈吳門笑看雪練胥江怒射春潮問我今何所見白雲半抹山腰劫數何曾增減浪談過現未來三世諸佛吞盡思大口何鯨哉米鹽喫盡如許光景剩有幾何當面若還錯過低頭枉費揣摩疑豈無因而至悟乃不期而然疑悟一齊冰渙撲破補起青天至理無分三乘真文不屬五車拙夫寧為小技烈漢豈蓄祕書未曉維摩一默無聲早是喃喃朱筆描成粉字青袍拖出蔚藍香嚴一貧徹骨無錐更道錐無後來賺人上樹笑杷成何規模有路還非入處無家正好安居就裏聊知貼體過頭不學掠虛世上從渠毀譽個中莫論疏親剜出虛空骨髓恩讎豈有二人沒縫衣裾綽若無孔笛韻悠然退步若知錯路抬頭依舊觀天將謂難乎今日焉有易于來年烈漢一腳趁上踏翻無底舷船善觸當鋒不犯慣奉無物可將雖是空如來藏金珠車載斗量業惑分迷分悟小根說即說離大都不識休咎穿鑿妄謂靈知大力渾忘擔荷好手頗具辣辛寧使剛刀截命不將眢井墜人灰冷地爐剝芋煙紅瓦灶催茶清絶恐添詩料淨瓶反手插花當路休呈劍術到門且喫杯茶舉意早先知有不勞拈出更佳曾作瀟湘釣客漁竿任擲西東捉得甕中老鱉夜來飛出成龍意路搜開百道情關劈破千重調御丈夫控轡何愁醉象獰龍果正貴在因真一是能翻百錯獼猴抬入道場古怪走而不作
