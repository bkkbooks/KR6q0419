body:
  text: 侍者傳善輯書答司理黃海岸居士三家村裏唱幾句蠻歌野曲若推向十字街頭便露出杜撰手腳此行為雲棲掃塔實副本懷他則非杖笠所之舟次捧翰貺知大居士一片婆心原欲接壽昌此脈洞水逆流第年來贏病愈侵應酬不及虎林高衲如雲名公盛集向上機籌大有人東提西唱似不必駢拇漢更出標指可也幸為曲施權巧轉機善辭或圖共酌名泉借軒帷入山罄數日之談此為鄙望餘容面對光風極領咳唾他不贅答虎跑慧公啓名山華剎從來哮吼有人子唱父歌相傳節拍能和久聆道譽千指樂從欲溯玄風孤策懸望虎跑泉而湧醴思共酌於椰瓢師絶響以續筋愧難賡于雪曲倘繞匝寰師之塔或得隨諗老之笻先指五雲繼遊奧域清香苦茗不妨與諸禪德劇談高座白椎原自有一方耆碩實冀垂慈高鑒俯遂出山本懷憑楮遙辭臨風布謝復妙行衆檀護雲棲杖笠未遊虎跑催符便至流連匝月欲返故山忽承衆居士瑤函下及珍幣殷勤意在鼎新妙行恢復喻大師奇功偉迹慚薄德眇躬難肩重任況萍光梗景未必穩棲地當佛奧祖區僧多玄梁法棟倘容偷懶別請高間萬不蒙允當借居停數日藉廣道緣或得與諸公拈皮論髓遠追少室家風指扇索犀重翻鹽官舊案此亦鄙願所欣愜也造次布復百謝高情復吳江衆居士啓赤腳踏寒冰六月涼生火宅白雲封碧嶂一聲鴈過茅堂正枯坐以無聊驚華箋而忽賁雙徑歷來法窟真師子吼時時響振霜林一國尊稱聖師大龍王池滾滾祥開月殿千有餘年勝概作興必藉名賢八十七人傳燈承接還須郢匠凌霄峰畔應讖有人興聖堂前登座已久在群公協其聲調不難賡雪曲之歌聽下衲別有機緣當展拜祖庭之側所望衆居士深追遠到踐實履真入門便是春風吹不動之軒登岸非遙野渡橫無人之棹俱作截流香象遍為護法長城握塵何期焚香致謝復太宰李西有居士隔秋慈遍禪人歸接翰貺因兵火震鄰飢荒接壤往來衲子不便所以難致郵也大居士淨性調直足下無私此便是端居大光明藏想日用事善自偶諧自不違時失候其他多三昧雖差別各殊昔人謂得用隨宜即便休若更不斷絲頭終被人哄入行鋪搬骨董不了公原曉人野衲何敢寱語聊藉以布候興居亦見丘壑人嚮往切切也復錢坤誠居士讀社告信居士荷鷲峰之囑纍樹毗耶之燈幢開六堂轉大法輪先戒如築墠弘教如庀材祖燈如堂皇衛生如漿脯懺摩如浣濯淨業如床蓐譬善治生者缺一事則用不彀駢衆美而屋乃潤此雜花之所圓演永明之所統歸居士從原疏派接樹遮陰則是搆深得雲棲家法然須擇行解兼備始能典其事以執耳之人非止匡輔大教亦乃裨贊王化恐時師僻習安足以振閎大之舉然雖如是設有個一不立六不收底來問居士入社未審安置他在那個堂好想眼具緇素勘辨龍蛇一點瞞公不得但不知誰是其人幸有以報我與相國錢機山居士台車一顧清談半日雖華嚴之機緣鄭公頓契黃檗之旨趣裴相知歸較大居士此晷風光似亦不減功名富貴是順緣公也盡嘗滋味憂畏患難是逆境公也無不經歷此際肯一齊看破頓然放下提起者著做去譬剝芭蕉心自露也況是品地完全真醇合道果體究緊切無斯須放空處昨云將謂遠原來近卻被道著矣然可作悟讖猛著精彩佇聽捷音冗筆不莊與太史徐太玉居士五雲枉顧又得一宿深談較鼓嶠更有風光別後想正眼頓開惑路辨清其工夫可直捷而入想不靠倒壁觀老子不休也在虎跑日與衲子切蹉陶汰如颶毋風消鯨波勢息惟有下萬丈深潭探取驪頷似難其人耳且別選一室顏曰炊香閣更與居士中有血性者痛加鉗鎚覺近日許多口頭禪一齊捉敗後來緇白如雲使宗門不亂旗鼓標幟有在世亦佛法之幸獨不能時與大居士握塵憑陵論向上事為快意然亦打鼓相賀等候多時公當猛省一決可也與杭州郡牧嶽衡山居士到武林即遊春風化日中況虎跑坐具地得借榻安禪無非覆載之力屢承台顧到一次如添一重法塹惟有瓣香遙祝太尊翁松喬永算大居士霖雨普天此為報謝微念然法喜唱酬其一腔屬望之情還須上上根人當機領荷想大居士以公庭為佛事撫字如度生躬踐實政德感人天肯參此末後句如壯夫伸臂似不難其力耳禪期將畢回策及時第不克摳趨一握塵談而別悵慕何如與寧波郡牧許雲賓居士大居士能於朱紱場中作善知識寬平為政便是福星清耿居官堪行佛事但願就路還鄉二六時中緊把繩頭看個主人公落處忽然雲開日出雨過山青便好撫掌大笑趙悅道聞雷聲真個撞采耳卒然一晤千載成緣因風裁謝猶憶奇逄復海寧董治聲文學文章如做繭脫此軟殼須有異人不然裹卻一生只成學問邊事居士偉哲非常能儒佛兩辦則出人頭地遠矣昨對塵次偶及不肯非斷斷要人如此以挽近師資弄成套索學者多愛人肯怕人不肯即師家亦喜人順不喜人觸審如此則擇法眼了無足憑若真是個鐵橛漢子他自知分曉肯與不肯是兩頭話坐斷雙關別尋活路直得千機頓發一事無干若到此個地位決不比山蠻杜拗任天下老宿肯亦得不肯亦得肯不肯亦得果能裂破老僧圈裷跳出亦好不跳出亦好跳出不跳出亦不必問人只消自家斷案可也復相國錢機山居士止懷仰間忽翰教下及且云此中蹙然如有所動此便是靈機發樞神光透露若盡情打動一番如六返震搖將無始窠臼徹底掀翻然後風清海晏寂然不動則向上路譬輕車駕熟原是舊家茶飯此個大安樂大自在法門公已現成受用之矣第在入路稍艱不敢不為先道破捧佳箑讀之皆是入門語脈竿頭進步更有好音布袍之贈尤感道念深厚草率布謝仍佇來儀答文學詹中五居士禪淨何岐人心自別但請一門深入徹旨後則融合兩字亦多矣居士既皆請益互相參叩知識原無二心口光殊有多色其垂手或稍差異到家時一齊併卻若存些子人法不忘是腳跟紅線未斷被人牽掣不能自繇自在耳居士豈甘如是哉想亦甄別之當然也與太史錢瑞星居士昔人問老宿如何是言説法身答斷頭船子下楊州近日公從廣陵回還薦得此意否若於斯領略雖在途中不離家舍於此未會雖居家舍常住途中大居士若道我已坐斷兩頭別行一路則野衲所借拄杖早賜封還可也一笑鄭潛老經天緯地之才殺佛活祖之手惜不及面談盡情捉下有復劄敢望轉致以報道懷復鄭兵憲潛菴居士錢太史歸接手教并佳刻讀之如見華嚴地位中人不特於佛法具有深心信入圓位至於治世安民能為全城保障碩畫奇算曲盡機宜真是救焚拯溺好手現菩薩宰官身説法者世不多覯也又見居士素以本地風光參研極則故垂問處貴尋主人翁落處不肯放過此又何等喫緊著鞭如所謂斬外寇必先斬內賊誠為高見第此事如握利劍相似要殺得天下人須殺卻自己殺得自己才能殺卻天下人若是情根欲境猶易掃開理路解會倒絆腳跟大段要從己躬下極其褫剝工夫方堪入作不然毫髮滲漏過於蠱毒昔人言過此鄉水也不得沾他一滴政謂情見兩途俱要拈卻然後撥轉向上關捩千自繇百自在雖有習氣千般業識紛飛到此際如野燒回青紅爐點雪不妨道個有意氣時添意氣不風流處亦風流居士若具透關眼自不疑野衲舌頭一片婆心拖帶泥水以報問法遠誠未必無少補也與天台邑侯彭赤霞居士龐居士問馬大師不與萬法為侶是甚麼人師云待我一口吸盡江西水即向汝道士於言下大悟此老費盡一生氣力到者裏卸角馱收籠頭較馬師道自從胡亂後三十年不曾少鹽醬卻又別是一段風光一人破家蕩産一人立業興家兩個共鼻竅出氣不識居士於此古錐舌路還一齊截斷否耶想日親簿書翻著自家公案放渠熱棒不啻徑山竹篦決牘如流總是大用現前葛洪有言若不是腳跟線斷也難得個自繇敢問公還是自繇耶繇人也簡點得出不亦少分相應矣與兵曹徐獨往居士喫人殘唾是近來禪者無化腐手段若單愛自家杜撰亦是聰明好辨所受病處石頭老人道乘言須會宗勿自立規矩此千古明眼證據今師家無此法馬故衡物失準第灸必著穴斧不留痕此了手人善高鑒處若恣性奇談不以平心較論恐螳螂捕蟬莫知黃雀在後古人簡點抑揚都與人做個手眼所以賞罰分明不似今人一棒打殺都無救活手段妙在殺得人活得人臨機應變與奪隨宜公於此覷透則如所駁者政所謂劍為不平離寶匣藥因救病出金瓶誰能逃乎秦王鏡晶晶然照見肝膽耶居士知我不諱頗似真切藉以為格外神交亦不孤虎跑相見一回此而布候殊無他語亦欲訊公近日行履也復兵憲董寅谷學憲張二無兩居士世界當缺減之劫旄頭驕殺運之秋不有治世菩薩保障東南則流寇所垂涎處不幾墟而無完郛矣想貴鄉有兩居士如紫芝黃雲之氣罩映江左而一帶安堵皆福星所芘屢承手詔竊慕道風豈止作天際真人想實以華嚴上士多寄迹于塵寰之中遊戲閻浮而作佛事愧癡蠅蘸唾莫可飛舉非特緣之絆人亦笑自絆其緣耳公等根力擎天象龍高步肯一念回光便同本得來問不獨敲鐘送響亦善動絃別曲聊因裁答冀有賞音此中湖山多勝足稱高遊倘秋涼放棹得對毗耶老子談向上捶開不二門慶快何可喻也便鴻布謝益溯光風復蘭溪邑侯吳公良居士大雲一席之談世外奇覯再想過華封聽絃誦重談末句忽飛翰至如快睹光霽昔人謂作縣如製錦此居士事也野衲屢住破院似補鶉衣此可見多生植本輸公一籌第錦裁必須刀尺衣補全在針線若謂刀尺不假針線還無綿密功夫針線不從刀尺終乏裁剪功能然則公庭皆是佛事叢林亦猶政務等與世造福耳現宰官身與現比丘身雖不同其親踐實履似不可隔一絲毫忝與居士俱遊博山之門同氣相求惟此一著先師座下一真實居士端有望于公捧來教甚愜鄙意也木佛天然恰似渡江影子但恐丹霞見而惡作有些救他不得奈何與鞠巖長居士禪客雖多掠虛之病淨土亦有靠實之過二法融通才好趨向上一路可無滯隅擔版之誚也法丁諍劫魔幟高張故先大師與聞老宿皆救弊因時乃有度幾個老實禪人念佛之語若一向安樁鑿孔換局更籌不若度幾個老實念佛人參禪亦不無其人大都工夫做到家一任亂翻筋斗倒拔釘楔禪也料掉沒交涉淨也料掉沒交涉和沒交涉也料而掉之便知得楊侍郎次公無一可取無一可捨太虛空中之乎者也又云將錯就錯西方極樂公既承兩知識婆舌開導必深有所得來翰恐是試水探竿茲不得已聊為葛藤一上若要徹見念佛是誰除是眼前空俗物腳底露莖毛自然補碎成片也復兵憲樊紫蓋居士衆生業輪不息世界魔運愈開流賊好殺人如犬無日不動刀俎梅長公書來卻怪佛菩薩不救山僧道庖丁揮刃時公何不即刻敕而放之耶信稱安土穀忽價湧數倍八十翁從不聞此玉粒之貴餓殍相枕真一時奇災也然閩浙皆然似補烽壘不及之慘公卜鄰葛水初謂兵可避而不知災不可避群蠆肆忿不過趁隊蜂起忘乎有手者能撲殺之譬貧兒學偷大段飢寒所逼耳居士心天仁愛視民如子且以佛法觀則冤親皆可度無一人不在光風化日中倘未結案幸再寬開一面網禪道無他妙在心能轉業則就此際望公入慈心三昧大行權巧幹旋一番不報無戇之施此後扳臥轅前感泣遮留何更有跋扈者哉前居士有持戒念頭此亦學佛者喫緊一著更有修懺摩以浣祓則宿孽可清俱成最上勝因想大智慧人知鄙説若合券耳答鄒孟陽居士此事繇起疑而入悟如因行路而到家直須就一疑打透則千疑萬疑一齊貫徹以疑情膚淺罕見有徹骨徹髓之人譬閲壇經者各各自謂領解殊不知斜睇摩尼偏執一色故嵩明教老人向空劃界割水分痕卻道個天機深者得其深天機淺者得其淺正使競斟海量納異牛涔可見鐔津之水始與曹溪埒派耳余承諸公招主虎跑因為衲子四八入室拈三問勘驗其一問針劄不入時如何二問得坐披衣自解作活如何是作活底人三問把定乾坤具甚麼眼若向第一問答得親切則入頭清楚第二問答得相應則淆訛徹旨第三問答得諦當則入彀無疑孟陽居士飽參此事選佛可期因出紙索語聊為施是法餌以鉤到不疑之地果到此際拙札付丙丁童子可也答聞子將居士學此道最先發心時要一味真實則中間工夫所到如一氣呵成大段發心真實則所信亦無不真實信既真實則所疑亦無不真實疑既真實則所悟亦無不真實悟既真實則所用亦無不真實其所以不得真實者逆料渠最初發心時多是人品掠虛則入路不真業惑深錮則所信不真揣度浮想則所疑不真暗中摸索則所見不真鹵莽施為則所用不真此宗門喚作孟浪漢即先聖亦痛為此輩嚴設籓籬不許混亂闖入故付授之初必先選其根品譬有嘉穀宜蒔良田譬若製琴貴選焦桐譬貯師乳須得寶瓶瓶不真則師乳迸桐不清則琴聲亡田不良則嘉苗瘁所以古德道遇人則途中授與不遇則世諦流布又曰非遇上根宜慎辭哉古德所謂遇人者即真實發心人也略舉一二與居士做個樣子昔大梅問馬祖即心是佛他便信得及後來住山三十年腳跟穩當馬大師亦惑他不動居士要問如何是真實信此可做個樣子靈雲道三十年來尋劍客幾番落葉又抽枝自從一見桃花後直至如今更不疑此便是一棒打不回頭底漢子雖玄沙惡辣亦攔當不得居士要問如何是真實疑此可做個樣子進山主道是柱不見柱非柱不見柱是非已去了是非裏薦取居士要問如何是真實見此偈可做個樣子真淨老人頌華嚴四法界云事事無礙縱橫自在手把豬頭口誦淨戒趁出淫房未還酒債十字街頭解開布袋居士要問如何是真實用此頌可做個樣子若疑今人真實做處無可憑據然則大梅常靈雲勤龍濟進真淨文此數老皆是發心極真信得極切疑得極到用得極熟如生米做成熟飯鈍鐵打成快斧足可為千古標格也太都真實兩字便是當人本心達磨西來不立文字直指人心見性成佛亦是直指各人實際風光秀師亦云直心真實菩提道場以世風下衰情根囂偽器乏醇正解多穿鑿既不能具斬釘截鐵之手未免多倚墻靠壁之見如來問中切中流弊亦自料簡分明則知居士信不泛常疑必結案見須審擇用不浪施肯細將三祖信心銘永嘉證道歌時置座右深繹久味領略全旨一番胸次更不存個元字腳當自豁然了然洞如千日矣短疏化修造穿鑿不相關物外煙霞贏得一身瀟灑莊嚴非有礙空中樓閣果然八面玲瓏龍池與鳳嶺爭奇為祖師漏泄西來大意佛殿共三門論議笑維摩空談不二法門山僧隻手欲成功蓋為扶他五葉居士萬緣都捨盡也須乞我一文向百草頭邊鋤破白雲無非開場選佛就三條椽下抉開金鎖秪要立地逄人咦鐵杵成針無別道木人敲斧不須猜黃金伏藏都傾出自有摩尼特地來化油燈道非明暗僧堂前日照三更夜有短長佛殿裏光吞一點爍破青山萬朵那知紙撚無油點開大地群盲誰道寒灰沒焰覓火直須深撥投明不假夜行拶破碧琉璃焜煌乎千門同照揭開多寶藏交羅也萬象聯輝果能油貴添燈滴滴具百千日月管取性天揭曉人人有萬丈毫光何以故我見燈明佛本光瑞如此化鐘釜敲月鳴風到處鐘須耳聽烹山煮海繇來鍋有人燒莫問鐵和銅每日鍵鎚無不響但添水與火三餐茶飯自然香雖云物乃家常何煩檀越大抵器須冶造必假爐鎚功倘遂于鼎成福定隨乎響應變生為熟豈沒個知味裏之玄輕擊遠聞定有人會聲前之句虛心一扣垂手全提祭文雲棲掃塔維崇禎九年歲次丙子正月望越二十六日博山法孫某謹以瓣香素供致奠于雲棲堂上先師太蓮池大和尚之靈塔前而言曰於戲遊雲棲之門莫能知其向背窺雲棲之奧末由辨其中邊不肖自壬子之秋從先師來禮足時側聆震吼狀洪音之發虡鐘竊被慈恩勝枯荄之遇膏沐繼而閲師太諸所著述如大官賜膳醫王施匕恍令病骨頓蘇直教空腹欲果味疏鈔則蓮胎有種才念佛而佛成披發隱而法鎧嚴身不摧魔而魔服全開寶庫賑乏靡虛濬決香河流潤不竭踞一乘而闢無量乘義珠網交輝然一燈而朗百千燈光暗室齊照旁敲曲唱禪靡專談善誘廣苞土皆圓淨續蓮宗而宛瞻廬阜移祖庭而不在少林智齊極果儼然古佛再來風肅前規一仍百丈舊貫誠末代法施之主無聾聵而不開隻千古未有之師垂龜鏡而永賴嗚呼道山峻極妙高慚其嵯峨梁木傾崩法門孰為砥柱繩繩到我落落匪材愧為腳下兒孫無由述其祖德不成供養聊表孝思春深花塢唯聞啼鳥幾聲月照蘿龕猶睹慈光三昧太虛莫繪讚歎奚為杯茗既陳音容如在知弗嫌于一滴欣來鑑于微誠尚饗祭博山先師維崇禎三年歲次庚午九月丁丑朔越十有八日甲午合山弟子某等謹以瓣香素供致奠於博山堂上示寂先師大和尚猊座前而言曰於戲我先大和尚包虛空以為量遍法界以為身掣華亭浪裏之金鱗奪壽昌手中之玉尺超今邁古祖庭之焰重輝迥地遮天大樹之蔭廣芘握群宗之綱領魔外鋒摧踏千聖之頂𩕳辨才瓶瀉空花影裏何妨撒卻戲臺生死場中一任打翻筋斗哀號失怙大似地裂天崩戀慕銜哀宛如考喪妣逝洪鐘莫扣繞獅座而寂爾無聞法幢既傾瞻鷲峰而儼然未散杯花聊奠海嶽齊悲嗚呼哀哉尚饗又於戲我先大和尚法門砥柱像季標幢為當代法施之主化門廣闢用一味伽陀之藥禪病皆蘇布網漫天撈盡魚龍蝦鱉鎔金作器打為叉釧盤瓶慈與威而并施宗與教而響答摘驪頷之明月入水元不動波捋虎顴之雄鬚得子貴親入穴圓機活眼淆訛一串穿來巧手妙心應變多方不倦粳秕猶能陶萬彙何法非宗咳唾足以潤群靈有萌皆發不肖某久淹虀甕濫廁罏錘難描倣佛之真幾費節拍之和羽毛未備空追妙翅摶風牙爪未成謾勞獅王調弄雖毒拳之未報何曾放過些來念痛棒之屢嘗如今更思一頓時至也拄杖撩起便行緣盡兮骨董何妨撒卻春雨淋不去昔年之句如何桃花綻倒枝今日之言已驗掣開無縫鎖湘煙潭水總傳神穿過涅槃堂鶴唳猿啼皆助哭慚愧不成供養悲傷無限衷情於戲哀哉尚饗
