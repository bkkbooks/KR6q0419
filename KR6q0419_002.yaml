body:
  text: 侍者傳善輯虎跑語録崇禎丙子春司理海岸黃公中丞集生余公洎武林衆縉紳居士請師于虎跑定慧禪寺結制開堂師升座拈香云此一瓣香氤氳結而地天交泰盤旋覆而海嶽春融爇向爐中端為祝延今上皇帝聖壽萬安前星朗耀后嶽齊高伏願皇仁浩蕩與日月齊明聖曆綿延等嵩葉永算此一瓣香瑞接空中紫氣香分劫外優曇恭為滿朝文武合郡宰官虎林護法居士信心檀越諸山耆宿本寺監院衆執事伏願道標峻揭長為法海神龍願駕高驂允作清朝儀鳳此一瓣香吞吐千秋靈氣含藏剎土風光專為供養開山寰中大師伏願玄風再振少林開無影之花法苑重新大樹垂普天之蔭此一瓣香雜毒為九祖佛也須蠱殺旃檀和糞貴賤不許論量恭為供養博山堂上先大師異和尚仰酬法乳之恩斂衣就座維那白椎竟師乃云今日升座諸方龍象擁集肩挨腳拶推倒香臺直饒你向千人叢裏翻身萬人隊中跳出還須與老僧把手同行始得還有麼如無老僧打葛藤相謾去也若論參學似登峰者必須造極溯流者決要窮源莫同流俗專學亂統秪如此一坐具地乃唐開山寰中大師道場者老漢腳踏實地不弄虛頭舌拄梵天掀翻到底故其垂示云説得一丈不如行取一尺説得一尺不如行取一寸者般言句如開一副大爐韝秪要鑄成純鋼漢子打就生鐵心肝方能了死脫生成佛作祖汝若説得行不得如空談樓閣終無結搆之功汝若行得説不得如靈雛在殼未成啐啄之用汝若行説俱到則知果熟曾經霜久瓜甜原為地肥汝若行説俱不到此是不唧瀏漢諸兄弟三世諸佛百千祖師在汝腳跟下答話已久若更想些胡答亂問來尋老僧鬥觜弄舌非但遲了八刻何曾夢見汗臭氣在當此之時真風莫挽頽波日靡觀禪宗凋弊與世界塗炭俱可痛哭流涕所以山僧到浙中來蒙合郡宰官洎諸山名宿敦請開堂意在因邪打正止法門互諍之風點鐵成金消末劫兵荒之苦諸兄弟必須真參實悟究竟到頭方得個大透脫時如其未悟稱悟非但瞞卻他人卻是欺瞞自己盡是泥犁種草波旬眷屬千佛出世亦救你者般東瓜茄子不得雖然如是山僧到者裏開個鋪面且道圖個甚麼拋綸為釣鯤鯨族小小蝦蟆謾上鉤上堂老蒼天靠你住昨日難防今日事花妍柳嫩正驕春晴空霹靂生風雨剌剌金蛇撲地飛巖泉迸溜峰攢霧雨過天清日出頭始知變態常如故不如故豈不見雪竇老人道大丈夫先天為心祖淨慈寺上堂山僧出虎跑三門赴聞尊宿洎合郡衆宰官居士湖上放生之約不意偶過淨慈諸公卻轉請上堂不知是何心悻然雖如是不妨借路經過夫肖翹愛命蠕動貪生業最慘于殺傷慈莫深于救護一夫騖漁獵之利何止戕百萬生靈一家奉蔬水之餐亦足活無限物類夫何全無不忍之心甘填難滿之腹賓筵殫水陸之珍食品耗萬錢之費既乏同體之悲焉無反噬之報因中失憫果亦無憐所以年來殺戮遍行生民塗炭良有以也惟仁人君子能全惻隱之風活路生機原開仁壽之域是以西湖勝集衆善駢臻輪月放生群公佳舉可以續雲棲大師悲深願廣之法乳庶不孤瓶陶尊宿利生接物之盛心所以太師翁云若恩周多命則大積陰功或惠及一蟲亦何非善事即此祝聖曆綿延之算共抒忠誠轉寰宇太平之風陰裨王化秪如永明大師道高低嶽瀆共轉根本法輪大小鱗毛普現色身三昧還有知得永明老人落處麼海岸居士云請問和尚如何是色身三昧師云飛者飛躍者躍是個甚麼進云如何是根本法輪師云能為萬象主不逐四時凋進云護生須是殺殺盡始安居畢竟殺生是放生是師便喝進云果是作家師云念汝尊官饒過一掌士禮拜師下座孝廉聞子將等請上堂錢塘江上春風起三月桃花翻浪勢五雲山裏衆鱗龍風雷特地催燒尾禹門萬丈躍煙霄振鬣掀鬐鼓異濤不但豐年霖雨足吸乾鯨海巨波消而今得個權棲泊相將盤踞炊香閣倒捲珠簾轉步來面前顆顆驪珠爍且道是甚麼人為他點眼良久云水晶宮殿杳淡墨也難描珍重孝廉唐祈遠居士請上堂祈遠居士問如何是參禪入手處師云吾常於此切進云如何是參禪險難處師云一一經過始得進云如何是參禪得力處師云把定乾坤居士禮拜退又一僧出問云和尚是個餅麵鋪趁爐灶熱再搭一個師云你問來僧乃問如何是參禪入手處師云截千人之頭臂剜萬人之心肝進云如何是參禪險難處師云拆佛殿毀魔宮進云如何是參禪得力處師云逆水船開順水風乃云諸兄弟者些答話雖是搬他間骨董也不曾思索出來不見洞山雅禪師云言無展事語不投機乘言者喪滯句者迷他家是透頂徹底的人臨機應用灑脫非常不似今人要句句投機卻被言句礙殺徑山老人道趙州禪只在口唇邊山僧道趙州禪如神廟裏籤千掣千聖萬掣萬靈初不曾安排吉凶使人規避禍福也方山老人道得意者所説皆是失意者所言皆非若以是非得失而論古駁今山僧綰上眉毛一任諸方貶駁卓拄杖下座解制上堂山僧手腳園丁日午澆瓜慣不曾今日根芽舒遍地春風引上石瓠棚秪如水到渠成瓜熟蒂落還有人道得底麼一月期場雲裏過天明分曉各歸巢小參師拈拄杖舉芭蕉清禪師云你有拄杖子我與你拄杖子你無拄杖子我奪你拄杖子芭蕉老漢扳例隨條就窠打劫要且無為人處山僧則不然豎拄杖云只個拄杖不與不奪拄地撑天如龍之活然雖如是非但芭蕉結舌山僧亦結舌有分且請拄杖子為衆説法卓拄杖云還聞麼衆無語師云大地是聾人小參諸禪德情乾識漏錯認法身言滯句迷焉離毒海法身邊事猶可以依稀倣佛法身向上事有幾個自在縱橫高峰老人偈云海底泥牛銜月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽會得此一偈則照用料揀棒喝交馳正好作曹洞兒孫洞山老人道五臺山頂雲蒸飯佛殿階前狗尿天剎竿頭上煎䭔子三個胡猻夜簸錢會得此一偈則偏正妙協機位環旋正好作臨濟兒孫恁麼道大似搓圓捏匾換柱移梁或有個乾嚗嚗底問山僧又作麼生規圓方竹杖漆卻沒絃琴家活臨時用安排便不真復笑云也只八成龍居永慶禪堂示衆植根不固必無鐵幹虯枝力量不充焉易摧峰抒海貴在深參極究歷遠窮高事境與理境齊彰行到與説到俱暢然後圓機普應不滯一隅信手拈來信步踏著信口道著若以淺識劣根剽竊稱禪何異將甌盛水空擬大洋掃寰中大師塔拈尺論丈量空之手鳴金戛玉希世之聲感神虎而跑泉翻移海嶽逐神駒而出廄蹴踏風雲今日窣堵坡前恍然覿師真面且道覿面事如何參差煙樹裏翠滴曉風寒問答僧問木佛度火時如何師云添上榾柮著進云金佛度爐時如何師云看取焰中輪進云泥佛度水時如何師云腳跟不曾濕進云為甚麼真佛內裏坐師云閉門打瞌睡僧問如何是城裏佛師云城外有進云如何是山裏佛師云市上有進云如何是家裏佛師云老僧不在此坐僧問如何是淨土師不答僧又問師亦不答居士見而問云如何不答師云若答他是土上加點便不淨也余集生居士問禪淨兼修者為當先參禪而後修淨土為復先修淨土而後參禪師曰此問甚為泥於融會者必須甄別若初心參學宜求一門深入不可腳踏兩船參禪則單提一句公案徹悟本地風光念佛則單提一句彌陀究極惟心淨土然後融禪入淨似一毫致於太虛融淨入禪譬一滴投於巨壑可謂野色更無山間斷天光直與水相通若先繫綴兩頭用心不一則兩端交戰於胸中佛不云乎制之一處無事不辦此可證也妙行語録崇禎丙子春司理海岸黃公中丞集生余公洎武林衆縉紳居士請師重興妙行禪寺以三月念五日進院天王殿不動而升普光明殿帝網幢前與麼相見伽藍殿明月為廊清風作殿拈起鋤頭從頭翻轉然雖如是善建者不拔祖師殿萬派千枝源頭一線信手拈花無人能薦咄云展佛殿玉殿苔封不帶埃珠林寶網鏡光開世尊猶自拈花笑且道笑個甚麼咦笑有個人重來上堂指法座云作禮燈王借此寶座大家有分得坐便坐遂升座拈香祝聖竟斂衣就座維那白椎畢師乃云生平不學楊岐老破院風光卻儼然薄福又來湖墅寺起爐搭灶豎空拳棗柏大士道法無定相遇緣即宗山僧在博山出門不知有虎跑底事在虎跑開堂不知有妙行底事今日受請而來大似夢境相似著一毫念頭預為不得此喻彌陀一坐具地因緣成既有壞廢必當興山僧業債難逃忽然落魄至此倘藉衆緣或可濟事然則緣之一字安排不得躲避不得所以古人云萬般從此道一味信前緣拈拄杖云秪有拄杖子不屬因緣本無成壞亦不用安排躲避卻能為一切衆生之所憑靠山僧涉水登山全承渠力拄地撑天豈更由誰倚在禪床角則聲臭俱無拈出法堂前則乾坤攪動諸人還知麼將此深心奉塵剎是則名為報佛恩卓拄杖下座黃海岸居士封翁八十誕會城衆宰官居士請上堂海岸居士問壽等虛空是何人師云量過虛空者進云虛空如何過師云出門先辨路轉步按飛雲進云恁麼則過了也師云切忌撞倒煙樓士禮拜師乃云海岸居士兩任浙中司理投錢飲水清畏人知決讞平反視民如子其尊翁自崑居士亦嘗令建德先後美政俱擅循良可見趨庭義方別有家傳矣今首夏初三日乃封翁八十華誕武林衆士紳想其人頌其德無以效華封之祝因各以衣裓盛諸香花詣妙行禪院請轉法輪以祝封翁無量之壽山僧道以法為親以慧為命不但父子同條亦乃祖佛齊證如脅尊者八十出家老趙州八十行腳全憑者個風流趁入花藂矍鑠非特此二老也一切諸佛諸祖以及自崑居士海岸居士亦無不憑者個而入大光明藏成就世出世間諸大功德也功德且置秪如今日因齋慶讚一句又作麼生道無根樹子無今古果熟香飄溢壽筵珍重康藍田居士請上堂昔喻彌陀齋三百萬僧闢此道場與天宮鬥麗師乃地位中人見地超曠行果因花成此一大功德海也今有藍田居士好善樂施以飯僧為佛事今日是居士設齋報薦先君康思萱先妣蕭氏一門宗族俱證蓮胎山僧自慚德薄難消信施供養衆中要選個無事道人出來酬他信心齋供且道那個是無事道人不見古德道眼裏著不得沙耳裏著不得水個是無事道人又有道眼裏著得須彌山耳裏著得大海水個是無事道人雪竇道恁麼也不得不恁麼也不得恁麼不恁麼總不得也是個無事道人山僧道三個無事道人總是不唧瀏漢要消施主供養依舊還難且道畢竟是甚麼人消得師指露柱云露柱呵呵開口笑橫吞倒吐肚皮寬結制上堂僧問解結即不問如何是衲僧向上事師云何不向下會進云向下事又作麼生師云井底蝦蟆飛上天乃云他弓莫把他馬莫騎線直路不許人知諸兄弟清心禪堂是個繫驢橛祖師公案是個葛藤樁四海禪和是一緉破草鞋天下善知識是一味斷腸草直須斫倒繫驢橛拽斷葛藤樁擲卻破草鞋拈卻斷腸草果能具此知見有此作略不妨千峰頂上卻在十字街頭十字街頭卻在千峰頂上繞他華藏世界百千萬匝依然止在一毫端如其不然且向一線直路行去好珍重謝衆居士齋小參世間飲食若還喫得消不得是可憂底事維摩香積飯喫得消不得卻是好事秪要吞得下吐得出便是超方出格手段非但能消四事供養亦可消得萬鎰黃金假饒有個不吞不吐底出來且道將何供養薄批明月渾間味細切清風更是奇問答僧問一天法雨洗兵威今日重輝古殿基如何是古殿基師云不見緑苔生問今日大開爐韝煆煉聖凡有個純鋼打就生鐵鑄成底漢子出來還受煆煉也無師云也要腦後一鎚問高高山頂立時如何師云巖顛驚石墜進云深深海底行時如何師云水怒浪花翻僧禮拜問倩女離魂事如何師云月淡花移影進云未審他是業識是意生師云風搖水作波進云畢竟是一個是兩個師云急急如律令問佛法無多子久長難得人既無多子更教人久長是何心悻師云若不久長爭知無多問古人道魚不識水鳥不識風迷不識性悟不識空此意云何師云所供詣實問劫火洞然大千俱壞未審者個壞不壞師云添起一堆柴問雲居打沙彌意作麼生師云非父不生其子進云如何是不呈底句師云賊贓已露茹無揀居士問鴛鴦繡出從君看不把金針度與人如何是鴛鴦師云一雙撲地恁孤飛士云如何是金針師云從來不度士禮拜楚黃宋心白居士四問問十方如來於十八界一一修行皆得圓滿無上菩提文殊選根獨取耳根何也且既曰返聞則不取音聲即千二百功德與八百功德皆非所論何得以耳根獨利於圓通耶又所謂逆流果收視返聽否耶若曰返聞自性則自性有何境界耶抑于無可指示中有可指示否耶師云獨取耳根者以音聞乃此方逗機之要故獨選耳如文殊云此方真教體清淨在音聞欲取三摩提實以聞中入是也返聞自性者非但不取音聲不論功德自性境界著不得個元字腳逆流者即入流其實即返聞意與收視返聽不別自性無性何境界之可擬盤山道向上一路千聖不傳若道有指示即傳也若道無指示爭奈又有向上事居士但恁麼做去若得到日如人飲水冷暖自知不用問人也問觀音云我從聞思修入三摩地又云初於聞中入流亡所此二聞字同耶否耶竊謂思則不亡亡則不思妄則不宜于思真則不宜于亡今既曰思又曰亡果何思何亡耶且動靜二相了然不生則聞與不聞皆非所計何必曰從聞入於聞中入流亡所耶師云聞具能所根是能聞塵是所聞從聞之聞具師資義謂從師得聞音教然後思修證入則未入流前聞中兼所入流之後獨有根存故云亡所也又來問思則不亡亡則不思此正不審思為何思亡為何亡教家有分三慧以疏經者謂聞慧思慧修慧以誘人循循而入所云亡者亡其緣所之聲未亡能聞之根及乎所入既寂動靜二相了然不生此亦只是打疊聲塵乾淨如是漸增聞所聞盡才顯能所雙寂到此境界則能聞所聞俱不生也經本文亦自層次分開如云初于又云漸增又云盡聞不住覺所覺空長水釋云盡聞之處即思慧為體亦名為覺至云覺所覺空者非但遣卻聞慧即思慧亦不立矣又云空覺極圓者泐潭標此處修慧現前也又空所空滅者此修慧亦遣也前三慧未空宛成生滅此三慧俱遣頓入圓明故下文云生滅既滅寂滅現前又璿師分此段經文為四一亡前塵二盡內根三空觀智四滅諦理然則亡所之亡亡前塵也盡聞之盡盡內根也空覺之空空觀智也空滅之滅滅諦理也尋繹斯旨則曰思曰亡非謾無階梯其中有觀照差別之異如嚼蔗味漸入佳境若必如居士所謂亡則不思思則不亡此又似今時拍盲禪人蔑裂教網混同作解不顧教家銷文有次第科經有節目翻被渠笑為杜撰又來謂妄則不宜於思真則不宜於亡此亦正坐前惑殊不知思則觀智深入善銷能所之妄何得不思真乃寂滅現前頓亡生滅之見何謂不亡又來問動靜二相了然不生則聞與不聞皆非所計又何必曰從聞入于聞中入流亡所耶此説亦是未明前意若明前意當不復有此疑也若不從聞入何由得見動靜二相了然不生乎問生滅去來本如來藏又曰性真常中求於去來迷悟生死了無所得不兩相反乎又如而如來藏本妙圓心非心非空以至非常樂我淨即如來藏元明心妙即心即空以至即常樂我淨皆兩相反何耶豈所指性有二心有二耶抑五陰法塵所指有二耶不然終于非即本無二義不明也師云迷則起衆生見見有生滅去來則如來藏性隨為生滅去來矣悟則本如來藏求其生死去來了無所得則生滅去來皆合如來藏性也以迷悟相翻似反若知真妄無別則非反也又如來藏有三初顯空如來藏離一切相故俱非次顯不空如來藏故俱即三顯空不空如來藏故離即離非是即非即此合中道義以阿難首請妙奢摩他最初方便世尊至此圓答三諦始酬前案居士詳此則來問非即本無二義無不洞然明了更不疑性有二心有二及五蘊法塵有二也居士初疑其兩反者蓋不聞雙即雙離之妙故惑非即差岐依違介念佛告富樓那云汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界我以妙明不生不滅合如來藏而如來藏惟妙覺明圓照法界泐潭謂此妙用如水投水不分能所繁興大用起必全真要以不思議心得不思議用則三諦妙義皆日用中事拈來無不是用處莫生疑一涉思惟徒勞卜度問以是因緣世界相續兩儀未生之先妄想因緣何人何自而有生耶又云諸佛如來妙覺明空何當更出山河大地則此世界諸佛所不容不亦留礙乎且山河大地不生則同混沌又何以成世界耶師云居士問兩儀未生之先妄想因緣何人何自而有生耶此問大似演若迷頭狂性未歇耳豈不見溫陵云世界業果衆生皆妙心影子如鏡中頭分別則妄不隨分別則狂心自歇也所以本經亦自斷案明白道汝但不隨分別世界業果衆生三種相續三緣斷故三因不生又云妙淨明心本周法界審如是則衆生界全是佛界以迷妄故虛空世界生起紛然妄盡歸源則山河大地純是一真法界然則兩儀未生已前早個依正互嚴生佛齊現喚作無生猶不可喚作妄想因緣又可乎又豈可落在頑空作斷滅想將謂佛界成則不容有衆生界乎矧又疑山河大地不生則混混沌沌不成世界乎此問正似滿慈騰疑細研佛答則所惑自袪昔長水璿師問琅琊清淨本然云何忽生山河大地琊憑陵答云清淨本然云何忽生山河大地璿師從此悟入居士兼參此旨則即時豁然便得本心不俟豫叨叨饒舌也
