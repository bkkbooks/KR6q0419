body:
  text: 侍者傳善輯瀛山語録崇禎己巳師初住瀛山鄭方水相國請開法初住院示衆昔日楊岐會禪師輔弼慈明時師資道合雪曲賡酬後來卻住個荒村破院老屋敗椽僅蔽風雨人不堪其憂師獨不改其樂衲子有請更創者固止之曰爾輩出家做手腳未穩早已四五十歲何暇閒工夫事豐屋耶翌日上堂云楊岐乍住屋壁疏滿床盡撒雪珍珠縮卻項暗嗟吁翻憶古人樹下居觀此老銅筋鐵骨久經大冶紅爐雪膽冰肝堅耐歲寒節操故能砥柱法門力振慈明之道中興臨濟之宗令人千載慕藺不及也某雖乏古人風致然亦頭腦相似忝依博山二十餘年愧無輔弼之才濫膺椎拂之任今力盡神疲稍尋個小歇場強來住此瀛山破院籬穿壁壞日炙風吹且與諸昆仲共喫些粗茶淡飯過此時光不曾將佛法二字挂人唇齒今晚茶筵為某禪人特請開示誾上座別無布施聊拈一偈以當效顰瀛山乍住壁籬疏冰滿床兮雪滿廬受用不嫌真淡泊家風親見趙州無端陽示衆江天空闊鳥低飛鰲鼓喧闐競渡時兩岸高聲齊喝彩看誰奪得錦標歸諸道友弄潮作戲尚且不顧危亡破釜焚舟必先鼓其鋭志何況生死事大若不努力打徹決了何期心苟怯弱終為落節之人志意堅強才是勝敵之手虎鬥龍爭即不問急水拋篙一著又作麼生大膽駕頭衝浪過小膽難忘覆溺愁浴佛日示衆釋迦老子向無生處說生破院道人無生可說釋迦老子向無滅處說滅破院道人無滅可說與麼道釋迦老子全身在生滅之內破院道人全身跳出生滅之外且道跳出底是在內底是不見古德道他人住處我不住他人行處我不行不是與人難共住大都緇素要分明若向者裏緇素得出跳出底不妨在內在內底不妨跳出搊住釋迦老子鼻孔一任轉身吐氣務破破院道人面門豈礙簇錦攢花何以故無生猶是末聲色本非生不因荷葉動那識有魚行雖然如是三十年後莫道破院道人為你諸人說夢除夕示衆溈山大師道欲識佛性義當觀時節因緣時節若至其理自彰諸禪德今夜是除夕明旦是元朝時節已至作麼生是自彰之理誾上座二十年前如個木偶相似寒不知寒熱不知熱桃符換不管春來爆竹響那知臘盡雖則如癡似懵要且世法瞞我一點不得二十年後依然業識從頭寒便知寒熱便知熱迎新歲也貼門神送殘冬還燒榾柮雖則隨波逐浪要且佛法瞞我一點不得如今跛跛挈挈只與麼過時光說知也得說不知也得說知不知總得何故不萌枝上從來暗辨春秋無影峰頭幾番明占氣候秪如年更歲換臘去春來在諸人分上還是知耶是不知耶若道知未免順俗違真不了佛法邊事坐在塵俗境界中謾道花枝偏有色空勞鶯語為誰嬌若道不知又是順真逆俗不了世法邊事坐在淨白窠臼裏只為冰堅難躍鯉卻緣水淺不藏龍只如去此二途畢竟怎生說個真俗雙彰底道理還會麼鶻臭布衫都脫卻穿婆帔子拜婆年問答僧問昔日黃龍今日瀛山法席不同法門無二即今龍象之中如何是不二之談師云眉毛分八字進云分後如何師云疊疊見青山進云見後如何師云拈卻如何若何進云門裏出身易身裏出門難即今六路齊收出門一句求師指示師云一線通天別有門進云好個無生曲繇來和者稀師云誰是其人僧禮拜歸衆問世尊出世曇花現瑞地湧金蓮和尚出世有何祥瑞師云火裏青蓮朵朵鮮進云還有為人處也無師曰隨家豐儉進云分明踏在瀛山上為甚麼看到瀛山早已遲師云秪識門前路難尋殿後峰進云山後事如何師云屋頂青松繞翠屏進云更有向上玄津乞師指示師云今日不向汝道進云為何不道師云案山未點頭在問如何是瀛山境師云千峰頂上疊青螺進云如何是境中人師云眉毛不露問大冶紅爐煉凡煉聖體非凡聖作麼生煉師云烹金雖有彩治玉本無瑕進云意旨如何師云重疊關山千萬層博山語録崇禎壬申春信州衆檀越及合山大衆請師住博山以四月朔旦開堂上堂拈香云此一瓣香氣壓群芳遍空遍界光吞萬象亙古亙今爇向爐中專為祝延今上皇帝聖壽萬安皇后齊齡東宮衍慶伏願金甌永固滿朝盡是夔龍黃河再清四海爭歌堯舜此一瓣香無煙火處拈來薰凡灼聖沒鼻孔人嗅著徹地通天爇向爐中專為山中檀越外護衆居士所冀真俗不二遠繼龐老之風心境雙融大露蘇公之舌此一瓣香價高無比靈根占斷娑婆酷烈難當毒氣親由洞水今日爇向爐中專伸供養博山堂上先大師異和尚用酬法乳之恩斂衣就座維那白椎竟師乃曰夫為沙門欲荷擔大法者必須先明第一義具擇法眼然後思所以弘法利生於二六時中法為家務法為城墻法為舟車法為茶膳不見祖師道心同虛空界示等虛空法證得虛空時無是無非法古今悟道知識橫說豎說總是說此無是無非之法妙在舌頭不黏著肉好眼不屑點沙終日說有不墮常終日說無不落空終日說非有非無不屬相違終日說亦有亦無不名戲論撤四句之籓籬翻百非之窠臼如吹毛在手殺活自由如明鏡當臺妍媸隨照所以道法無定相遇緣即宗大抵法性寬波瀾闊才是大方家接人手段著著都有妙處今時學做善知識為人說法者多求其深知法體深通法性善說法要者如麟頂覓角無幾人耳初心參學分上若大理未明大法未了必須要真實操履真實究竟果到此個田地即使埋藏山谷不肯出頭自有人剜肉然燈捨身為座雖諸天魔梵亦將下來請轉法輪豈闡提隻手能掩其太陽光輝乎今日檀越衆居士洎合山諸禪德殷勤勸請山僧舉揚博山宗旨如將千斤擔子逼上肩頭責備將來躲閃不得山僧只得冒登此座為諸兄弟說幾句粗茶淡飯若喚作說法大有人笑者個蟲豸在笑則任從且道誾上座畢竟是博山逆子耶孝子耶卓拄杖云自從拗折撩天杖今日重拈活似龍復卓一下云珍重沙縣陳秉初居士請上堂萬水千山特地來為緣聽法請登臺山僧指示無他語長夏山中正熟梅昔甘贄行者入南泉設齊仍請南泉禪師念誦泉乃白椎云請大衆為狸奴白牯念摩訶般若波羅密行者拂袖便出南泉齊後問典座行者在甚麼處座云當時便去也南泉便打破鍋子拈云甘贄入寺設齊砒霜甜似蜜南泉打破鍋子毒手利如錐簡點將來父子失情匆匆放過今日陳居士若請山僧念誦秪向他道住持事繁免得打破鍋子傷了客情山僧與麼道且道與古人是同是別良久云曹溪波浪如相似無限平人被陸沉四月八日上堂教中道未離兜率已降皇宮未出母胎度人已畢與麼說話大似一床錦被蓋孩兒遮掩得好諸道友若向父母未生前覷得破便見盡大地是釋迦老子面孔盡大地亦是諸人自己面孔諸人自己面孔與釋迦老子面孔更無差別於此不會卻勞他從頭離兜率降皇宮出母胎度幻衆真個是納一場敗闕所以初生下來便乃指天指地獨自稱尊二千年外卻被一個跛腳阿師要一棒打殺與狗子喫貴圖天下太平諸兄弟雲門一棒剛要打殺釋迦老子山僧今日一棒恰要打殺雲門秪如山僧替釋迦老子出氣諸兄弟還有替跛腳阿師雪屈者麼衆默然師笑曰不是山僧逞人我果然難得十成人栴檀像成洪惟心居士請上堂趙州云我有時將一莖草作丈六金身用有時將丈六金身當一莖草用曹山問僧云佛真法身猶若虛空應物現形如水中月作麼生說個應底道理僧云如驢覷井山云道也太煞道秪道得八成僧云和尚作麼生山云如井覷驢山僧道善塑無如曹山善雕無如趙老不露些子刀痕真個手段高妙若會得如驢覷井便曉莖草化作金身若會得如井覷驢便曉丈六金身當草目犍連枉運神通優填王徒煩匠巧丹霞正令劈頭行誰道子孫賢不肖今日是新安洪惟心居士設齊為報薦先慈敬塑栴檀尊像一軀送入先師塔院供養仍勞書幣殷勤以山僧誕辰懇請為衆說法說法且置畢竟造像齊僧有何功德卓杖云不求有漏人天福大孝全彰古佛心上堂舉玄沙大師問鏡清云古人道不見一法是大過患你且道不見甚麼法清指露柱云莫是者個法麼沙云浙中清水白米從你喫佛法未夢見在師拈云此一則公案不識者將謂玄沙不肯鏡清殊不知兩尊宿旗鼓相當塤箎迭奏可稱難兄難弟矣所以天童老人道鏡清久不作佛法夢也又云須是玄沙同參始得天童可謂善知無舌語解聽沒絃琴真個是二老賞音者也若作勝負商量此人未夢見佛法在近來法門淡薄兄弟家相見惟敘寒溫情面款待佛法二字絶口不談看他古人一唱一酬之間如函合蓋似箭投鋒足為千古眼目今日是五慈禪友從浙中來以久參先博山之故特來掃塔設齊供衆仍請山僧上堂激揚斯道可見世雖末法人尚古風不愧為法門昆仲矣然正眼觀來不是好心何故你在浙中喫了清水白米卻來纍及山僧償他口債且道口債作麼生償擲下拂子云除是維摩老知吾施受心報薦先相國方水大居士上堂心眼本開無奈空花自翳性天廓朗只因迷霧長昏佛說世智辨聰是八難中之一以學解多知遂成理障故翻不轉文字窠臼打不破生死牢關當其迷時文字語言總是障道根本及其悟也語言文字原是解脫正因妙在反手覆手耳昔李渤刺史問歸宗常禪師云須彌納芥子某即不疑芥子納須彌莫是妄談否宗云人人傳使君讀萬卷書籍是否李云然宗云摩頂至踵如椰子大者萬卷書向何處著李復問一大藏教明甚麼邊事宗舉拳示之云會麼李云不會宗云者措大拳頭也不識李云請師指示宗云會則途中受用不會則世諦流布師拈云萬卷書何處著伸腳處便縮腳掀翻窠臼絶狐疑真個拳頭好作略不在途中不在家世諦流布亦不惡下座上堂據理而論世法中埋沒多少人佛法中醒卻多少人爭奈古德道佛法中迷卻多少人世法中悟卻多少人古德此語未易搆他語脈何也佛法固是難通紅塵撲地能有幾個輥出頭來若往昔未熏般若直須正念全提如猛將戰出重圍方可解戈卸甲到此則太平世界任謳歌堯舜之風清白門庭爭接起夔龍之武不礙逢場作戲何妨借路還鄉秪要踏得穩靠得實然後擴為利濟廣被無涯將世法喚作佛法將佛法喚作世法有何不可雖然如是秪恐不是玉是玉也太奇舟中放燈小參性水澄清元無漂沒妄波鼓動遂有升沉既迷出世津梁不睹光明寶藏千波競湧誰然照水之犀一口吸乾孰是倒瀾之手溺而不溺直須跳出者層波生而不生轉取騰霄那一步只如白浪滔天還有不被顛溺者麼良久云移舟不別水舉棹即迷源小參生從何處來死從何處去大家業識茫茫可憐無本可據秪如有本可據底人又作麼生拏住布袋口擲卻拄杖子左手控飛龍右手跨猛虎亂把繡毬拋倒踞香臺舞浪蕩不歸家何彼復何此彼此且置秪如今夜現前大衆畢竟是業識耶非業識耶是有本可據耶無本可據耶咄不入祖師室茫然趣兩頭懺堂小參若論本地風光如摩天俊鶻豈落二機如踞地師子全威不動直下便見無第二人擬議即乖焉容鈍置正位尚嫌尊貴偏方豈落程途旋風千匝打歸來機輪絶斷無回互昔三祖求二祖懺罪二祖云將罪來與汝懺三祖云覓罪了不可得二祖云與汝懺罪竟審如是理懺尚且不有事懺更復何憑假饒事理雙融便證禮佛三昧也未知有向上事在汝等諸人不可匆匆放過珍重茶話如來常寂光如月印秋水衆生心水濁月即被雲遮佛開淨土門豈離心境有心淨土亦淨吞卻山河影土淨心亦淨擊碎玻璃鏡心土二俱離蓮花出淤泥心上二俱即娑婆真樂國賣花人過野橋香巢松鶴唳疏枝仄且道畢竟事作麼生師按指云東土西天一絲不隔今夜是鄭式蘧居士入山修懺報薦淑人張氏有令兄爾周居士設茶供養大衆命山僧鼓兩片皮當知淑人靈爽頓坐上品花輪親瞻紫磨金相去也夜寒珍重茶話身心猶泡沫世界若乾城情想等空花生死如夢幻不達夢幻無以超生死不了空花無以破情想不識乾城無以出世界不知泡沫無以了身心譬如空中蜃氣許多妄認樓臺陽焰非波渴鹿謂真是水所以輪回苦海無有脫期圓覺經云知幻即離不作方便離幻即覺亦無漸次若能如是究竟不妨宴坐水月道場轉此如幻法輪降伏鏡裏魔軍成就夢中佛事到此境界則所謂如夢幻如空花如乾城如泡沫者皆如海印發光成就游戲三昧矣今夜鄭式蘧居士追薦淑靈張氏設此茶筵我等飲水謝源不可忘卻檀施且道不忘底意如何師乃拈起果子召衆衆舉首師笑云不可日用而不知茶話舉僧問雲門如何是法身邊事門曰枯樁又問如何是法身向上事門云非枯樁若論法身邊事知有底能知若論法身向上事不知有底卻又知或有個知有不知有底出來你道此人是會得枯樁耶非枯樁耶師舉起茶盞云張三貪杯李四酒醉茶鍾落地果碟粉碎直饒曉得正按傍提也難與睦州老人弄唇接觜問答僧問和尚為人一句作麼生道師云縵天帳子無人見笑把鮫珠倒撒來進云三聖道我逄人即出出即不為人此意如何師云我不似烏龜鑽破壁進云興化道我逄人即不出出即便為人又作麼生師云也是反手卸籠頭進云正當出與未出時如何師云眼橫鼻豎僧禮拜僧問德山托鉢上堂雪峰道鐘未鳴鼓未響者老漢托鉢向甚處去德山便歸方丈此意如何師云竿頭才露影誰識轉身人進云巖頭云大小德山不知末後句未審不知在甚麼處師云攘羊證父進云密啓其意未審如何師云汝道他是甚意進云德山便休去不知是何心行師云才是德山進云明日上堂果與尋常不同不知不同在甚麼處師云汝且道我今日上堂是尋常是不同進云且喜老漢會末後句不知會在甚麼處師云末後句且置汝還見德山麼進云巖頭云秪得三年活未審巖頭具甚麼眼便恁麼道師云也是蠅子放卵不顧佛頭進云謝師答話師不顧僧問離四句絶百非請師直指西來意師云千年池裏鱉一釣上竿來僧擬議師云倒拖出去著僧問先鋒即不問如何是殿後事師云出身雖有路轉步莫迷蹤進云三軍一命重在己權師云倒跨毗盧印橫揮寶劍寒進云恁麼則四海謳歌樂有餘師云是甚麼歌答云吽吽師云汝卻解西天人梵語僧問上來道個不審能銷萬兩黃金下去道個珍重亦銷得四天下供養若作佛法會滴水難消若作無事商量眼中著屑請問和尚如何即是師云你卻銷得幾何僧一喝師云秪易叱他泥犢子難教擊碎鶻崙磚僧云光透日月明暗不收時如何師云是甚麼光僧又喝師云莫便是光麼僧又喝師云你只有者個結局便打僧問落葉知秋即不問如何是把定乾坤句師云恰值中秋節進云不跨雲橋浪裏舟因甚人在彼岸師云闍黎掉在水裏進云恁麼風捲嶺頭雲浪翻潭底月去也師云那裏學得虛頭來僧無語師便打僧問恁麼來時如何師云看取腳下進云不恁麼來時如何師云轉身就位進云恁麼不恁麼來時如何師云撞入葛藤窠僧禮拜僧問如何是賓中賓師云面面撲灰塵進云如何是主中主師云猊床不露影進云如何是主中賓師云出門不上路進云如何是賓中主師云歸家不坐堂進云賓主句蒙師指示知音一句作麼生師云試唱一曲看學憲陳雲怡居士問問蒙示末後句最為要緊敢先問取當頭一句師云掉轉身來看問眼見餓夫滿前自無粒米陡起悲心作何救濟師云雖無粒米倒廩傾倉問自己與千人萬人同餓偶得半升脫粟還食自己還食千人萬人若食自己安能獨餐若食千人萬人如何分飽師云逼塞虛空何分饑飽問咒咀諸毒藥所欲害身者念彼觀音力還著於本人東坡居士杜撰改還著句云大家都沒事俗眼觀之卻是大士憯刻東坡平等慧眼觀之如何領取師云笑倒補陀巖問跛鱉曳尾泥中腳腳著地神龍夭矯雲際首尾無蹤兩者孰實孰虛孰勝孰劣師云深含獨占更加參問眼見分明不肯全身拶入過在甚處師云夜鼠愈走凍蠅不飛又云過在不肯處問多生來一領貼肉布衫如何即脫師云要脫作麼問家珍雖不被劫偷兒時來零竊如何勦除師云一齊揚下著問彈無絃之琴唱希聲之曲急切覓不得一個半個知音請問博山三十年來知音有幾師云蒙此一問直待案山點頭問廓今無問師作何答師云早知居士有此一問鼓山語録崇禎壬申總憲能始曹公農部得山林公及衆鄉紳請師于福州鼓山湧泉禪寺結制以六月初三日入院上堂拈香云此一瓣香端為祝延今上皇帝聖壽萬安伏願一人常有慶萬國永無虞此一瓣香專為山中檀越護法宰官居士伏願作儒宗之柱石為法苑之金湯此一瓣香專伸供養博山堂上先大師異和尚少酬法乳之恩就座白椎畢師乃云若論佛法如蚊子上鐵牛無你開口處未免權向第二門頭說個譬喻去若要造進此道如人行路一般必先尋一條直捷路上行更要向差別路頭一一透過始得秪如山僧在博山束裝出門諸兄弟有先從柘浦抵芝城順舟而下不數日便到鼓山何等快捷山僧從鵝湖穿馬嶺經壽昌登廣福涉鐔津其間歷峻嶺而千盤經回溪而百折所過州城紛人士香花之接遍遊蘭若觀叢林法化之儀經六十餘日始到鼓山何等曲折若論一踏便到諸兄弟誠得便宜若要曲盡逶迤須學山僧重重經過險難始得今人參學多喜直捷理會不知果有見處更要透過差別關頭始具決擇法眼然後清機歷掌珠滾盤圓萬化從心兵隨印轉咄此總是途路邊事料掉沒交涉且到家一句作麼生道大衆無事各自歸堂好結制上堂亂意猿奔樹塵緣馬過橋不到心空處何日得開交所以古人立個期限要你向甕中捉鱉諸兄弟直須內不住心外不住境黏膠既脫窠臼掀翻果到心境雙亡正好通個消息若有露得消息者山僧當拭目以待咦龍門高萬仞騰躍是何人誕日上堂僧問象赴龍奔各趨慶賀請問和尚年多少師云與拄杖子同年進云然則不歷春秋度常延不老春也師云狸奴白牯自知時僧禮拜歸位師乃云業風吹墮閻浮界肉襖頻經脫換來覷破未生前面目方知露柱是娘胎教中道諸法不自生亦不從他生不共不無因是故說無生山僧道諸法從自生亦復從他生亦共亦無因說甚麼無生諸兄弟若向教中意會去如斬開荊棘指出一條大路若向山僧句裏會去如不動旗鎗便爾就路還家所謂發足有殊到家則一也僧出問和尚因甚麼忘卻生身父母與露柱作兒師曰苗從地發花借春開便下座解制上堂諸兄弟九十日期今已滿閉門作活事如何不曾捏殺獼猴子重疊關山未易過大抵末法禪期真參罕遇縱他意樹抽枝未見心花成片雖然如是冷灰裏豈無一粒豆爆還有不跨石門扶豎晏祖門風者麼如無且向蘆花深處宿月明穿過釣魚臺元旦上堂春色無分新舊年光豈有去來洞見剎那三際從他葉落花開不見白楊順禪師道染緣易就道業難成不了目前萬緣差別秪如昨日喚作除歲今日喚作元朝浮字虛名憑誰安得若乃千門爆竹使大地而驚雷萬戶桃符替虛空而挂彩銀燭透紗籠之影銅瓶簪楊柳之春堂奏管絃響送木人之耳爐燒榾柮威袪石女之寒景物森然風光滿目若喚作目前底法則心外別有境象若是自家屋裏事如何領略此段生涯還委悉麼根塵元是吾家寶無奈空花翳眼珠果爾斯須常返照自然不到喪居諸茶話喫茶知是茶味喫飯知是飯味因甚麼又道人莫不飲食鮮能知味不見僧參趙州州問曾到此間否僧云已到州云喫茶去又問一僧曾到此間否僧云不曾到州云喫茶去監院問云和尚因甚麼到也喫茶不到也喫茶州喚院主院應諾州云喫茶去諸禪德若知趙州三度茶話則茶味飯味徹底皆知諸兄弟須知此茶不論主賓寧拘好醜南北東西各一杯虛空澆濕眉毛皺大衆夜寒珍重茶話乾坤靡久停之客紅顏無可駐之丹日月穿眼底之梭人命似急流之水伶俐漢抖碎虛空驀翻筋斗便好向急水灘頭下得腳穩就無陰樹下終日打眠然後拈來世諦總是曇花轉步塵勞無非華藏諸道友果能到此境界不妨道個處處緑楊堪繫馬家家有路透長安辭衆茶話山僧今晚借龍泉上人一杯茶與諸君告別當知山僧來也不曾出博山去也不曾離鼓山紛紛盡是拖泥水動念無端滯往還總是情關不破識浪難乾所以把手忍分判袂愁訣當知道人分上卻不其然不見進山主云來來實不來途中好善為去去實不去路上莫虧危若知得山主底意便知誾上座不離丈室常在途中不離途中常居丈室還委麼杖頭踏盡縱橫路遍坐青山作道場水口興濟堂請小參來從淵關來去從淵關去來去自奔波淵關渾如故不見祖師道萬法本閒唯人自鬧若知鬧底即是閒底便見燈花燦爛色不關情若知閒底即是鬧底便聽簫鼓駢闐聲非礙耳何以故有物為物則被物物礙膺塵本非塵則可塵塵合道舉起拂子云拂子是塵喚甚麼作道拂子是道喚甚麼作塵擲下拂子云還知麼關津雖放過不許販私鹽又夜請說茶話至道無文至理無說無說無文是何妙訣閉戶造車出門合轍如豹澤毛如龍蟄穴鼓浪乘風江河倒決轉妙旋玄其機始徹一棒當頭破皮出血擔版不圓只得者橛機權變化不思議舌會盡淆訛衆流可截且道截斷衆流底人是何手段不曾過水口那識是淵關黯淡寺請小參禪非放意可參道非矜持可得矜持則心頭常惴安能順水張帆放意則繩頭不緊焉能逆風把柁如人未過黯淡灘頭未免心驚險墮既過黯淡灘頭便乃放身倒臥如此參學終有矜放之失安契中道之妙惟智者善能陸地行舟空中走馬夷險皆如逆順何訝且道因甚麼得如此穩便移舟不別水舉棹即迷源開元寺請小參古德悟道偈云一拳拳倒黃鶴樓一踢踢翻鸚鵡洲有意氣時添意氣不風流處也風流慚愧古人露手露腳鼓粥飯氣大似個白拈賊殊不知天關未轉地軸未旋徒爾驚群難極底蘊誾上座則不然展開坐具包群象抖擻袈裟裹太虛六臂三頭誇好漢輪王未與髻中珠何也大方無軌則應物任偏圓董巖請小參道人用處如風行空理透徹而意自玄機虛閒而神自王一任神駒蹴踏還如靈鶴翱翔蓋得無心於事無事於心自然虛而靈寂而妙不拘修證寧滯有為諸兄弟若欲得此受用直須繩頭緊把自然透出重關且道透出關外底人是何作略天容難覆載器水逐方圓
