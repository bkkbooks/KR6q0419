body:
  text: 侍者傳善輯偈之餘五言示禪人此道最幽玄莫生別欣厭但辦一心求莫計程途遠一要意真誠二要絶貪戀不被境緣牽直下如射箭佛祖衆機緣一一皆方便透得一樁去拈來都成片切忌亂商量狐疑起邪見非真明眼人莫遭胡指點抖擻復抖擻中道莫疲倦只靠話頭行機關自圓轉汝若計空言太虛生閃電自古參玄人刻刻常自勉與李季寅琴師妙指發箜篌清音傳海印試問彈者誰為君通個信不見道曲終人不見江上數峰青與胡調仲居士及盡無門路分明撞入頭釣鰲忘雪夜獵兔趁天秋平踏峰千轉深撈月一鉤此身遊萬象寶藏許全收金豈凡嶽牧顧山中以二偈見投因答此芥孔藏身穩到來忘淺深蒲團翻得轉塵剎現全身其二雪色窗前月松聲屋裏濤西河看吸盡滴水化金鰲示懶雲禪人居山無事居山好山中事若何遍栽松欲老舒卷任雲蘿山居雜偈翛然無個事展卷讀殘經謾道圖遮眼磨天鏡更清一片頑石頭平生最相似不必鐫作佛何用安名字指汝心即佛何繇信得及不隔一重門牽手誰肯入妙悟非繇他丈夫須了義不在語言多步步踏著地居正絶方隅箇中太尊貴削角不磨稜即偏皆本位直遂難藏曲盤旋又太紆當機先一喝笑倒赤鬚胡一個鐵饅頭具足百滋味盡力忽咬破不見當門齒朝看東鄰花暮賞西園菊不妒他人時終還自家福不挂一絲頭超然忘管帶只恐水牯牛斑駁未馴在有路從渠入無門賺客來若非彈指漢樓閣幾時開淨土我常生蓮胎親入定禪淨擬分疏轉隔西方境洞口桃花發靈雲道眼開不知金屑貴佛面滿塵埃衆味方作羹一縷不成繡所以雜花林莊嚴殊妙有毫釐休繫念瞥起即傷他止止不須説分明妙法華般若何為體虛空笑破口體用分不分依然落窠臼道德五千言那句是真道八十母腹中白頭兒已老禦寇仙都子乘風羽翰飛不知風起處且坐釣魚磯憎愛家常飯死生衣裏珠紅罏烹煉過片片映水壺鑿井須及泉鑽木期出火寄語學道人自畫終不可險巖須踏穩曲巷要穿通識盡還鄉路家中客邸同垂絲千尺水意在掣華鯨透網將何食煮茶敲澗水虛堂一夜雨滴碎古人心最有木人巧無絃撫妙音是非關裏過擊碎是非團渾崙吞雙棗如何過得關參禪如鐵石心境自雙忘撲破玻璃鏡花開枯木堂智管謾窺天識蠡安測海破塵出此經虛空碎米大忍人難忍處行人所不行破除憎愛見涉世一身輕學道非難易從門那得門問津無入路不覺到桃源水流岩答響花發洞藏春不曉居山趣山中亦是塵巖深人不到到必不為深唯有深無底乾坤在此心飯熟菜羹香石坐苔裀暖將就過時光減劫難求滿六言偈寄余集生居士時謫嶺南芭蕉剝出心來枯木糝些花子不因雪上加霜爭識趙州苦死打破蔡州是賊漂墮鬼國非邪且喜停囚長智五燈開朵新花聖主非常罏鞴祖家別樣槍旗盡道五羊戍客新添一髮禪師紗帽視為苦具緇衣非了道緣問取曹溪行腳何時頂相重圓山居雜偈一夜立教雪積萬仞拶到崖崩錯受神光三拜至今笑倒胡僧少林面處皆壁韶陽普字為門問我雪關何據杖頭展布乾坤布袋打開沒口鉢盂洗淨安唇咬破廬陵一粒果然價重三斤好個路頭入處風流出自當家種菊非關對酒愛蓮誰道貪花世味如人嚼蠟塵緣似馬過橋萬事燈前弄影一場鬧熱元宵匝地紛華悅目長年絲竹寫音不是圓通上士色聲謾道唯心苦樂場中觀劇榮枯夢裏看花玉琢不移堅潤金烹愈見精華雨過荷翻翠蓋風來蟬送瑤琴六月緣何無暑涼生雪膽冰心七言偈示禪人參禪最怕落窠臼要解虛空翻斤斗塵情切忌弄漚花諸見莫教開戶牖個中事本無難易只為人根有鈍利利根不肯辦真誠返被鈍根做到底剔起眉毛莫放間精神憤發透重關若還冷坐無思算不墮偷心便落頑死生豈可同兒戲光景門頭休認是打破重重關鎖來方才好喫廬陵米答瓶陶聞大師趙州曾訪寰中老般若親提苕帚掃八旬行腳掣顛風缺齒逄人先咬倒瓶陶尊宿虎跑來眼光閃爍語轟雷四衆叢觀如矗嶽鷂追鶻子摶天飛其時略露些頭角回帆撾鼓遊川薄湖南寺裏大鏖兵劈空架造珠樓閣劫家人被賊家偷引向潮前拍弄舟千尺寒松擎嫩幹笑看石壓筍斜抽枰邊冷地敲間著慣打不妨薶手腳此情説與大家知個是沒毛蟲太惡也不惡苦似蜜兮甜似藥示萬安一居士持金剛經持經不必較功德千卷萬卷須自得持經不可輕易用福德智慧從此湧但向心中著意參字字皆為般若種金剛般若丈夫心昔日南能悟入深覷破腳跟無所住打開伏藏運黃金居士善根原自厚篤信斯經樂持受天龍八部護琅函四八何妨在經首三十二分強安名就裏掀翻最上乘至理不留元字腳虛空縛殺爛麻繩然燈記莂釋迦尊早是空花落眼痕空色兩重關擊碎大家扶起破沙盆題夢澤居士畫牛圖牧童慣識牛兒性澗飲山奔恣所之只在索頭收放力緑楊陰下醉如癡山月照松風吹此際人牛兩不知隨分納些真個好溈山老子得便宜長樂陳覺非居士書法華經跋之以偈三周九喻妙蓮華權實雙彰法界家秪貴心中開寶所無煩門外覓牛車何人鑿井方求水窮子歸家喜見爺今日覺非非已覺筆端花發自靈芽贈百拙關主真關巨闢啓重玄海印空澄鏡百川好拼青苔生我舌從他黃口説雛禪水晶珠瑩和盤轉霜劍鋒寒出匣便奪得輪王真子印者回方許話頭圓與樊憲副紫蓋居士木蛇解握便忘言撞著疏山笑拍肩不向瞿曇輸落後卻嘲靈運枉爭先月華冷照霓裳舞石女新梳鴉鬢妍選佛場中穿下過風光隨地是家園與樊伯括文學説癡即慧兩無根妙在隨緣返本源風自吹開紅日路雲如點破碧天痕五湖不礙扁舟泛一口誰將萬象吞家有龐公為聖父團欒都是好兒孫與三山陳參軍一道靈然性本光上根人自肯擔當入門果見羹墻面出水方知菡萏香心地融通誰不佛津梁隨處豈須航雖於富貴場中走觸目無非是故鄉寄徐太玉太史格外深談喜有君相看屴崱海峰雲偶然擊竹原無悟大率拈花豈屬文珠在盤中光自轉劍揮空裏迹何分錢塘江上潮聲急知我方知我不聞贈馬半邡居士非物非心亦非佛澄然如水無筋骨打破雲門膠腦盆翻身攪動蒼龍窟笑看一馬生三寅下載清風隨剪拂雪關雜詠八首虛空逼塞是吾關不與乾坤共兩間劈破須彌擎露柱統開法界入灣環摩尼殿角龍藏影菡萏花中佛破顏卻憶當年天目老高風絶世邈難扳儼坐如山獨峙高大千廝結兩眉毛娑婆布滿千花座華藏虛遊百寶刀香霧夜分微欲線琴聲風細急如濤道人此境常時別九月花開絳樹桃真心寂爾自形忘涉入洪波不似狂語共趙州呈漆器默如毗耶顫空床霞籠仙掌盤承露月繞天池鏡放光且喜重重關鑰破幾多旅泊盡還鄉岐路忘羊覓轉多多岐與我不偏頗騎歸繞寺生獰虎喚出離瓶養熟鵝坐得蓮臺非是佛奪他拄杖自成魔如今笑殺溈山老水牯投胎沒奈何不逐間情起愛憎也無佛法繼南能春來楊柳枝枝月臘後梅花樹樹冰尉斗煎茶殊有味鉢盂安柄太勞形趙州懶下禪床揖冷眼看他岐路僧倒騎黃犢上青皋踏折山腰舊石橋平地雪抽三尺筍南山雲覆半簷茅懸崖截斷人難度碧落衝開鳥獨驕渺渺一江煙水闊是誰隔岸手相招百堵周墻竹一叢香爐木榻對禪翁鷓鴣夜宿花間雨燕子朝翻簾外風住世渾疑遊夢裏忘情何必隱塘東潯陽江上潮聲急近日麻姑書信通幾多花鳥幾陰晴春樹春山映月明黑漆關頭如未透迷雲眼裏自添盲清風倒跨鵬程遠千里橫奔駿力能要解出廛行舊路也須毛骨一齊生關中呈方丈爆地忽雷驚白晝誰家黑狗尿青天夜深彌勒穿廛過手把袈裟笑掣顛示悅衆琮友參禪心似離弦箭一鏃三關直要穿狹路逄人渾不顧等間拈出火中蓮示無知禪人我號無知君有知有無那個得便宜果然妙極無知處狹路逄渠笑雪眉示智實禪人家破人亡不挂絲迸開衣縫露明珠追風良馬行千里笑看收鞭卻是誰與文學沈澤民居士胸吞雲夢未為奇撞倒須彌更與捶傾峽不存元字腳曹娥江上好題詩與文學鄒孝直居士吹律易回寒谷暖騎驢難覓雪中詩生涯一段憑何得搔癢從來只自知與文學洪原明居士千金聲價購雞林爭肯輕拋衣裏珍悟到至文無隻字笑從人乞頂門針與太學龔華茂居士格外求人不論文才華如驥出空群贈君一管無毫筆書破羊欣白練裙與文學周元湛居士重門深入好旋身盤踞千峰線路親指顧風雷皆我物乾坤獨住不容鄰與嘉興朱寶臺居士名場已放間拘束此事如今可著鞭點得鐵成金汁後拈來瓦子當珠圓與藍郡董寅谷居士丈夫別有千秋業此個根基不等間鐵壁銀山挨得入與君彈指笑開關與文學董爾基居士入道還須心似鐵急追本有莫忘疲一回揣出虛空骨把斷關津更是誰仁和宋喜公邑侯有興復智果之意以偈寄之坡仙夢繞湖山勝不忍參寥地劫灰茂宰風流今接踵俸金傾出布香臺似詹中五居士一線通天別有門橫奔直走任掀翻個中不立間窠臼隨處方圓達本源答大宗伯董玄宰居士大地紅塵撲地飛隨流須得截流機笑穿軒冕場中過抖擻千年火浣衣答蘭溪令吳雪崖居士蓮花偏愛泥中出可是居官不染心筆底棒頭開活眼放光何必在祗林與參戎徐巨升居士道人繕守此心城魚麗縱橫練法兵一片雄心收得盡霜鋒冷焰世清平與文學沈吉人居士一回談唾便開顏不為間情數入山此道如人登絶頂莫教中路畏巑岏與蓮居新伊法師曾與章安為弟子義通性相貫千花良遂敲門心忽肯始知禪講不分家與密印禪友兩度相逢鬢更蒼浮圖幾處盡恢張何如壁立千峰頂嘯月眠雲石作床與鄭是則居士靈根本是祗林樹直待參天始見高好向蒲團開隻眼溪山春色滿雲袍與鄭爾周居士一門深入自忘緣萬仞峰頭片月圓打個翻空斤斗下珠簾倒卷看青天與鄭姇尹居士才涉思量便落窩心如墻壁絶捫摩神龍攪動香河水真個無風起白波與鄭立生居士萬境虛間不繫心入門轉見此中深靈樞撥動真關捩透脫無非自在人示鐵幢禪人鐵脊撑天即此幢波旬一見倒戈降偏方正位都經過八面玲瓏笑掩窗示亦非禪人心佛亦非非亦非無思靈焰發千機魔旗祖幟都揮下始信如今戰勝肥與蔡光祿密汝居士密在汝邊親切句分明漩澓合曹溪千枝萬派歸源後擲卻溫郎照怪與余未也居士孰云未也入無門不道圓通屬耳根春到桃源花發處乾坤原是我家園寄陳旻昭居士窮經謾道志相違無地容錐尚有依盡力打翻窠臼去旋風妙翅九天歸示遺聞上人脫去廉纖道眼開火中拈出片冰來盤旋妙翅乘風力擘海曾吞龍子回雪中作雪作箋兮冰作句不須呵凍筆為奇銀花玉樹紛開遍猶待長空迸赫曦眼底清光銀世界一聲裂帛響空飛何人放出雕籠鶴轉引天鵬萬里歸冰山雪洞都推倒立盡孤雲道眼高明月蘆花猶不似靈雲錯認是夭桃色映梅花不帶塵冰條別種一枝春誰同仰嶠看師子除是能過此色人示空諸禪人身心無處好參尋習氣銷融礦即金兩朵眉毛如劍刃不妨隨地振叢林與劉和鶴居士十年釣盡寒潭月海晏波澄絶照時今日金鱗休滯水衝開鐵網浪頭飛示心地禪人莫謂即心云是佛從來淨地卻難忘直須透出威音外翻轉虛空作戲場山居幾樹膚紅山果熟一條白練瀑泉飛道人不到忘心境遏捺如何息得機空谷足音聞欲喜靜中思動反添塵縱然千指常圍繞元是孤村一個人剩栽多福門前竹笑指南泉夢裏花不了目前差別事果然惑障若塵沙几靜窗虛蕉映緑幽然清磬出林皋攤經謾道圖遮眼屋裏何妨走一遭竹篾三條束肚皮此情惟有藥山知馬師拋出間裷繢也是憐兒醜露時
