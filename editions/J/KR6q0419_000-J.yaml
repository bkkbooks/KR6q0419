front:
  text: 雪關和尚語錄序雪關和尚語錄目次序傳卷之一瀛山語錄博山語錄鼓山語錄卷之二虎跑語錄妙行語錄卷之三拈古頌古贊偈卷之四偈之餘卷之五尺牘疏祭文卷之六詩博山雪關智誾禪師傳閩中西峰居士曹學佺撰師諱智誾上饒傅氏子八歲喪父母鄭氏送依景德寺長老傳公為童子傳公教令頂禮觀音大士一夕夢大士手摩其頂由是泛覽群書奭然意解一日見壇經火燒海底句疑之乃參禮博山來公山令默究船子藏身公案行住坐臥提撕不忘偶入槽廠行見磨鼻拽脫有省有偈呈博山曰直下相逄處由來絕覆藏舌頭元是肉不用更商量博山喜曰子可參禪也後作五頌請壽昌衲衣山曰宗門語句如滿口含冰不曾道出水字子風骨太露更須死心一番始得師乃掩關謝客兀坐返參凡六載經幾重㓟剝始徹源底偶作雪關歌山見稱善乃為開關有偈曰始行大事六年雪頓入圓明一片冰今日幸親無縫塔掣開關鎖萬千層繼命首眾一日領眾入室次山垂問曰堂中首座人天眼目如何是人天眼目師曰頂門上山曰還假鑑炤也無師曰君不見山曰不虛參見作家來師掩耳而出己巳受瀛山之請瀛山古剎四壁蕭然作破院歌以自樂相國鄭公方水以詩慰之曰太甲之下是瀛山依稀破屋兩三間聞師支傘過天漏譬似楊岐雪滿關居無何博山和尚遷化師奔喪至喪事畢眾推繼席自是往來瀛博之間提示不倦督學陳公懋德入山訪師置二十五問師應答如流陳大服膺壬申春予同諸公以鼓山延師結制於是演法鼓山玉瑩珠迴玄風遐播期滿還錫博山丙子春中丞余大成司理黃端伯以杭之虎跑請師應之大弘祖道口唇纔動輒滾滾不竭環師而聽法者萬指繼而妙行請師重建經營二載大殿落成師曰吾今可以謝喻彌陀矣丁丑秋示微恙乃謝院事鼓舟南邁孟冬朔旦行抵瀛山病體尪羸群心洶洶乃作遺書謝諸檀越時壽昌闃公自博山來候匡坐敘別悰闃公問和尚安否師曰且道我生耶死耶闃公曰末後句也須分付師彈指一聲遂微笑而逝弟子弘恩成許等迎歸博山建塔蓮花峰之西原師示生萬曆乙酉年九月初一日示寂崇禎丁丑年十月十一日坐三十一夏享年五十有三有語錄六卷
