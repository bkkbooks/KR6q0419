body:
  text: 侍者傳善輯詩五言古彭質先廣文誕日詩以賀之濬哲本天人數非靈蔡卜千歲軼莊椿五經笥邊腹夙慧冠詞林挺然好堅木漢品晉風流文章錦繡谷驊騮碧玉蹄款段安能逐手持天竺書根利刀批竹心潭龍未降義藪虎先服超出塵象表頭上冠寧束廣文豈為氈中丞厭食肉願作宰官身因深緣自熟栽蓮愧比匡呼鵝應待陸一枝優曇花聊佐飛觴祝駿發在茲時鴻猷當秉軸勿使道盟寒靈山曾受囑送吉水陳青逵文學歸閱藏世羅密如髮眾愛織成目既墮此中生超然幾脫俗非有大力人泥深沒象足苟無決烈志安能翻此局君今何高挺靈鋒慧自夙愛子且能捐塵韁豈能束千里望雲山輕舟來何速相送兒出家還歸謝故屬靜掩三間茅閒簡千餘軸了卻生平願別唱無音曲家在青原山山光炤几牘爛煮廬陵米折腳鐺中熟咬破一粒時百味隨心欲丈夫疾求道抽刀剖寒竹直下便承當六六三十六與董鄖陽八際使君涼奏比巖吹茆堂秋欲沐峰氣邈含陰太灝顛何肅似濯煩歊襟清鏡超蒙俗廓視寰中虛真機朗如燭曠古徹來今千秋瞬不足至今空洞懷萬事雲流目攖鋒截毛寒驊騮疾驅轂出則蟄龍飛處則神雞木伏御兩忘情柴桑遂貞復廬阜不多高遠公道名馥當時十八賢氣味相渾穆杖藜偶過橋笑聲虎驚谷世豈無淵明破院慚幽獨安得長者車荅歌蓮社曲擁帚每跂予還期訪脩竹不必論禪深浩然公素蓄永嘉到曹溪何妨留一宿送孝廉劉和鶴居士北上二月桃始花策馬遊上京春雲如送遠春鳥如緩程執手問行役君去路自平盤腹既萬卷落紙江濤聲十年悟一字海岱無留情持以獻明聖旦夕富蒼生固若籌閒事君豈淹世名心為度人楫身作護法城游塵滿衣帶終返青山盟歸來小菴樹已匝茆檐榮朝飯一口雪晚壁半點燈問荅維摩似起坐文殊并嗒然笑相視不覺松風清此意與君說聊為薊門行無奇歌贈楊生山奇峰戍削水奇波盪折物奇吐精華士奇標卓越君生負奇姿駿采神先軼落筆驅前茅不逐時流轍一出詫空群辟易千夫傑旗鼓目無牛氣吐虹光燁願言資醇平遊奧隮堂闕珠以蚌為衣玉以石作穴山川媚而輝靈閟後乃洩售奇豈因炫嫉奇不為跌欲上凌雲梯眼空出金屑楊雄亦有言彫蟲非所挾豹霧澤其毛七日食俱輟遊鶤息以翔六月天風捷虛懷己亦忘得妙江河決讀寒山詩作我愛寒山詩不入時人調句句洗塵情安在事華藻至人寧逐物廓若飛空鳥豈但出樊籠兼忘脫矰繳長眠松下石興來欹浩浩拊掌笑如狂東顛復西倒高揮石壁上暗書木葉杪乍看意句新轉玩滋味好冷眼觀戲場熱鬧何時了相逄拾得來快把苕帚掃垢面與髼頭不令俗子曉恰被閭丘生覷破神通小至今天台山白雲封海嶠日日松風吹夜夜江月照此意人不知對面千里邈贈禪者居山山居清絕處萬境喧囂息此時道人心相與同岑寂澗水響如琴猿嘯下石壁風柯作梵音巖花吐幽色俯拾橡栗餐問煨魁芋喫樂此煙霞情觸目心境即憶昔永嘉書左溪尚未識君能了斯旨動靜隨意適七言古次韻寄永嘉何山人無咎維摩昔日誰為爻文殊普賢稱最厚君今辨才如瀉缾吸盡西江無出右曾聞落筆走波濤妙解入廛看花柳想是雙林再出來還疑永嘉親世久雖然墮落此風塵一點靈光不辜有翻笑龐公兒女癡說甚無生話太醜年來金屑眼中空惟餘奪命符懸肘江南俊彥足如雲幾個藏身依北斗潘髯程虎擅芳聲播弄精魂入詩酒近從寶婺識王即風流藉甚都人口八悲曾爾譽雞林一覽便能識虀臼豈因造物妒人奇無耐生機賊其肘去年健足走如飛今朝杖子不離手盤跚強賦出無車牢落誰憐衣短後相逄知己話寒燈不覺精神俱抖擻豈無愛客孟嘗君彈鋏何堪迫衰朽茂陵作賦氣凌雲病渴多因憐少婦丈夫筋骨可撐天到底情關誰自剖還如老象沒泥中盡其神力難奔蹂讀君臨別贈千言彼岸相呼疾回首靈苗不必待新栽般若何須探二酉心如湛水生蓮花觸處欣逄無量壽當時彭澤素心人亦厭浮名等芻狗東林往事成空譚未若參禪貴知有我欲來看雁蕩山相期不必裹糧糗問疾搥開不二門拈花同禮靈山叟武昌寒谿寺乃遠法師道場時孟玄旨孝廉得一大士像從野老茆檐灰燼中出非金石土木之所成容儀殊特觀者嘆異因賦此志之江面數峰凝紫翠榜人遙指寒谿寺隔岸蒼煙抹麗譙黃州百雉明秋幟落日林端逗磬聲入門想見古風清山川遺墠思高躅道價嶙峋豈浪稱昔聞靈姿躍魚網今復茆楹騰瑞像非關罏冶與埏埴分明妙相呈灰壤光儀閃爍非金銀範手琱工枉用神大士標奇真叵測物無虛應示當人君不見陶公侃文殊捧足雙舒掌江漢重逄孟孝廉寶珞親瞻事非兩夙緣何幸對披襟揮麈憑陵吐妙音問我洛伽何處是楚天鴈叫碧雲深雪關歌天地一蘧廬古今誰搆始而我揜斯關安居毛孔裏毛孔不窄關不寬金烏玉兔時往還照見幻棲關裏事玲瓏八面渾無阻坐聽流泉松下鳴倒看雲影峰頭露青天放眼瞠不睹石人欬唾生風雨有時藏身沒蹤跡檻外璚枝分野色有時沒跡莫藏身釣盡寒潭躍浪鯨此關何為雪呼六六月紅罏飛霰撲我關不記春與秋花開葉落山常幽我關不占天和地一段光明覆無際我關非內亦非外扁舟蕩漾遊滄海我關非動亦非靜旋嵐偃嶽心恒定萬象為關關萬象空合空兮聯帝網卑而不下高不危疏而不漏暗復朗誰謂此關小圓合太虛無欠少誰謂此關大只在一塵含法界法界所有關中聚笑擲大千為戲具法界無物關中空放開捏聚如游龍龍飛虎步恣騰踏板橋忽動霜蹄滑劈破雲門一字關剔起眉毛還險煞有問關中主若何指頭無縫全機活破院歌破落僧住破院破破落落無藏閃十方通洞沒遮攔玲瓏一座空王殿晝無香夜無燈風過時驚壁倒聲法堂幾丈生荒艸佛面飛埃堆滿層樹為龕苔作簟一餐脫粟千家膳竹筧泉分花塢來石頭敲火烹茶便客到稀僧過少寡逄迎兮罕談笑扶罷犁兒拴卻牛攀崖獨坐看雲鳥猿窺廚鹿飲澗相近相親如作伴長打門前之遶行知予胸次無涯岸松何蒼峰何秀石壁潺潺下飛溜身在千巖萬壑中道人行履君知否放情懷縱瀟灑山靈供軸天生畫熱鬧門庭讓別家煙霞嘯傲過王伯呵呵呵煞顛倒說甚禪機譚甚道順情逆境兩重關幾個不隨分醜好休掃聖莫輕凡罷論前三與後三索價撩天誇至寶爭如伸腳放癡憨虎踞前豹哮後見我耽如垂耳狗生平毒惡不關懷摧化獰心如拉朽浪擔憂空過慮恐怖之中觀自在自家佛殿好莊嚴依報缺些也無礙嫌淡薄愛溫飽此等何由知道妙一生橡栗著荷衣千古高標人莫造從荒涼任倒壞破而不破真如界彈指輕開樓閣門捉敗明州憨布袋老楊岐古神鼎藜床積雪那伽定更有栽田博飯翁令人想像偏饒興破落僧住破院意趣幽深人不見流俗阿師未必同縱居華藏生忻厭如意泉歌有引瀛山從太甲分枝有雙澗夾流在左右兩翼峰之外去寺稍遠寺有井暨五池時秋亢無以汲予因攜笻入塢之東覓得一泉從石竇間迸出味極甘冽可供數千指因作歌以志喜且呼為如意泉蓋予手持一鐵如意撥開泉眼水即應指而出故命名云山色巃嵷何秀拔疑是鷲峰分太甲如幢似蓋湧神囂翠積樓臺霞欲潑中藏乳竇秘寒湫未濫觴時似截流我來匡徒食指眾秋深井沼竭難求稽首雜華香水海娑竭遙分脈非外手攜如意踏林皋所控必無爽諸丐俄聞好鳥樹頭鳴樹下幽崖小鹿行俯視艸深淤濕處聲生觱沸耳邊清呼童荷钁開泥面石罅纔疏珠急濺喜將柄鐵發其淙迸破源頭那一線柔光湛碧注琉璃煮出甌花暈綠脂忽陣春風傳磬響佛前先供滿瑤卮笑呼同侶斟還坐知味其中能幾個三喚無煩老趙州肯與茶仙較清課此泉未出山之垠澄不停兮攪不渾此泉崩流通浩瀚綆莫汲兮竿莫探要知滴水廣含藏萬派千枝同一貫更有神龍深處蟠酬經變化雨潭潭軍持直透金輪際倒汲滄波徹底乾題白毫菴偈後虛堂冥坐清無事開緘遠承瑤帙寄新詩百首手自書錐沙截鐵饒風致詞家三昧屬何人公於翰墨聊游戲一毫端上現神通筆劄大小神全備夭矯香海出遊龍揮霍長風摶妙翅誰謂筆腕疲精思恰似希夷偷打睡字學無心詩偶工個中活計難思議山中多少縛茅僧輸與白毫菴主意無門鎖子縫輕開沒底船兒篙慣刺逄人借問綠葡桃滿盤拓出鮮紅荔讀公詩無義味空空洞洞欺邊笥舌頭元是肉生成揮灑千篇無一字五言排律讀曹能始觀察遊福廬山記知為海上名山其寺乃相國葉公道場時雲會上人來索予詩因賦此以當臥遊閬風多玉削海上近移來壁罅天門陡峰腰佛殿開濤奔千澗雪樹抱七層臺蜃氣飄空散鯨波盪日迴異香傳洞口幽境逼天台石盡玲瓏態亭多曲折隈浮圖懸讖許紫閣再來裴香火地偏勝金湯劫不灰臥遊如歷掌枚叔信奇才上樊山王本是金輪裔何須紫氣占群靈皆翼衛百福自莊嚴道不由師悟才真與德兼神全多蘊藉語至絕廉纖秘笈探龍藏新詩吐鳳箋屏翰宗社倚城塹法門瞻賦艸隨時得心花信手拈光風難再睹去棹欲留淹贈法主來從師子窟一吼便驚群智邁三支秀才兼八索文廣陵濤作辯雪嶺草同芬目富心俱飫器傳水不分道安傾眾難慶喜擅多聞赤腳幡猶豎青龍鈔已焚鞭前窺駿影樹下服魔軍目翳空金屑心花燦印文迦梨吾不愛得意許傳君五言律同費海鷗山人經臺看石山中清富貴怪殺石頭奇座湧狻猊皆花擎菡萏枝秋雲兼鳥落午溜覺風吹霞外心相許非君更有誰贈若惺師優曇吾不見縱見不如君得法如傳水揮毫欲吐雲久知鵝擇乳應見驥空群說罷楞伽義心花露印紋次韻送吳山人道甫歸華亭孤笻雙徑出臞甚鶴憎顏我任虛舟泛君隨旅泊閒吟狂詩發嘯骨傲癖成頑月照虎溪水書招早入山寄白明府此邑方分竹他城候及瓜公堂縣夜月山廓富春花到處民安堵來時雨裛車香山白太傅遺艸滿禪家遊聖水巖谷轉樹蒼蒼橋邊過野堂石屏雲泛影天鏡月臨光寒漏猿傳磬空更鹿遶床巖前流聖水野老卜豐穰宿湓江作風俗鄰蘄楚山川秀且妍浪頭高似雪江面闊如天客店蘆花岸漁家楊柳煙持盂行欲乞遠浦不停船荅董德受居士一返西江棹迢迢海上峰龍門難密邇鳳彩想儀容豈為千山隔還如對面逄宛同真臭味毒我玉芙蓉遊雪峰憩瀛山堂我住瀛山寺茲菴喜共名峰青連樹秀沙白晃星明潮水迎帆影溪風撲磬聲扶笻登雪嶺此宿想多生題天鏡巖扃秘靈奇久鴻濛忽啟藏巖吞江霧白泉灑洞門涼鏡可容天面窗惟貯月光道人何所見一鳥過滄浪七言律壽鄭相國方水先生六秩珮聲辭曳五雲端出處分明謝險竿客飯愁無鮭作菜道裝也愛籜為冠羅應笑翟門前設琴或思聰指下彈身似虛舟還不繫壺中跳入弄雙丸慈功上人棲鼓山詩以送之絕頂無過屴崱峰海天極目水朝宗一枝聖箭遙穿鵠半壁神泉倒喝龍路入白雲行杳靄殿開碧嶂望巃嵷何年振策尋煙島飽看高高石罅松寄金岱輿憲臺萬方懸覆一天雲使節遙臨粵嶺分地接炎荒如灑雪風清蠻洞早沉氛信州父老思遺愛江國才名望不群此日台階星斗近金湯佛土借鴻勳與董仁原明府萬松陰裏借籃輿香積盤餐品只蔬棲鳳嶺多趺坐石浴龍池有放生魚回頭記得來時路見道何須萬卷書元是旃檀林下客明珠依舊在衣裾自壽住老空山鶴伴眠披簑來往釣魚船逄人有點裝憨相說法原無出格禪熨斗煎茶供萬口袈裟作被蓋多年問予壽量今何數笑看龍牙襪底穿其二髮長貌醜一頭陀破衲從新補嫩荷日月兩丸穿眼鏡煙霞千嶂隱身窩笑看石女梳霜鬢長聽黧奴唱野歌曠劫促延拘不得春秋半百豈為多鄭方水相國見訪山中次韻酬之百里巾車度委蛇清光蘿際共雲披不嫌野飯同僧缽若問宗風看祖碑梵靜獨餘天樂細詩成猶較燭花遲山窗月上仍忘寐去汲清泉燒竹枝遊西巖振策來遊百丈巔道人無住宿風煙洞門豁若鯨開口石壁危疑佛坐蓮隱約盡巖還有路玲瓏一孔別通天大千掌上如觀果萬朵河山入鏡妍壽融闇上人雪浪菴頭供采汲恩公衣缽許親傳神珠獨耀誇明月妙翅高摩逼義天手種曇花今幾樹人如寶掌住千年生平不解離圓覺對客清譚舌湧泉山居年來瓶錫樂幽林禪寂何嘗事若吟掬水引魚時上下穿雲采藥幾晴陰鍋兒撲破何須洗樹子無根懶去尋纔聽溪邊人有語又隨麋鹿入山深五言絕句山居雜味選石留人坐拈花供佛看年來禪寂樂不獨在蒲團鳥來傳法語天為雨新花莫論玄中旨相逄且喫茶流壑聲無盡春山煙更晴偶來松澗曲閒與鹿群行竹裏安茶灶松間挂鷺瓢山窗涼樹密五月聽鳴蜩嫩鋤穿石筍老摘墜藤花雖是山居樂平生口懶誇樹匝峰千轉崖飛瀑萬尋到來非遯世門徑自幽深閒拈松作塵自疊石為城占斷峰深處扶笻絕頂行栗黃垂殼坼芋熟撥灰香供佛秋花少芙蓉開小塘不羨簟瓢樂猶貪丘壑清柴乾谿水便稱我住山情講經臺空生岩下坐雨花落如霰白馬未曾來早已傳經遍浴龍池龍馴風雨息清水浸莓苔坐石閒看慣猿歸鹿又來棲鳳嶺石壁桐花落山空小鳥飛嶺頭霞色起知是鳳來儀靈源橋雨過夜塘深鸕鶿飛欲起橋上望秋山影倒流水裏七言絕句寄俞公遠二首瓦缶茆龕一個燈白雲為幔坐閒僧夜來借問天邊月曾到君前照未曾樹底常聞鳥說經山泉慣汲滿銅瓶松風不肯容高臥夢到谿亭吹忽醒徐山人香水有章臺之戀因以儆之夢裏花枝蝶自迷醒來猶恨五更雞蓮花雖向泥中出爭肯和根倒入泥答李飛侯文學青蓮仙品落人間何意巾車過雪關相見不須施棒喝夜深明月照花龕題聽松山房似聞白馬起潮頭惹得錢王控弩愁我試與君坡下聽分明天樂響箜篌山居疊箇石頭松下坐選枝竹杖手中攜看山莫道無閒伴野鹿成群送過溪柏子長燒香滿爐磐陀坐聽鳥聲呼瑞巖不識菴中主剛要惺惺喚醒渠龍山客到便移菴拂尾靈龜我不堪混眾獨居皆可意白雲深處及封關鄰僧送箇藤花枕紙帳無鉤竹榻低幾度放憨呼不醒那知窗畔日頭西泉石獨饒清供好煙嵐竹樹畫圖開從來身在千峰裏長嘯高歌歸去來熱鬧門庭饒一著幽深境界占三分蒼松白石容高臥隔斷紅塵遍是雲瀛山八景一指峰西來大意憑誰說壁上孤峰豎指頭煙水百城都影現善財猶自向南求香象峰生獰氣勢度香河截斷中流萬頃波何事橫眠煙霧裏笑看兔馬走前坡紫芝塢石骨蒸雲芝艸秀松脂潤地茯苓多結茅此處人稀到水面香風吹綠荷脩竹塢種來一徑篔簹綠玉版逄人恣說禪迸出龍孫千萬個春風補我破苔錢如意泉泥深艸濕乳泉藏小鹿貪眠樹底涼試向源頭揮一钁四時花塢水流香東澗水鳥惜落花啣去緩鹿窺清影下來忙閒情飽看青山色坐聽潺湲歸亦忘西澗水雪瀑交飛谷裏喧石橋虎過漸黃昏瘦笻問我誰為伴笑指扳岩下樹猿金鐘山不待華鯨吼曉風賦形疑是蜀山銅太音豈入時流耳常自聲傳萬壑中六言四句山居曲磴遙峰數里斷橋流水三灣有鳥來啼竹院無人閒閉花關準擬岩棲壁立還思泛宅浮家興到間尋煙嶠倦來一枕蘆花桃萼幾枝紅雨柳絲一把蒼煙眼底風光爛熳問君春在誰邊石罅安排茶具松陰聽斸苓鑱坐逼風泉欲冷何人招手高岩麋鹿群中散步漁樵隊裏相將真嬾幾分幽趣天放一種清狂石骨穿雲欲露泉聲帶雨分流種竹平遮地角卓菴先占峰頭不見崖猿捧缽時看谿鹿銜花偶逐漁樵歸去行過村裏三家覓伴松間敲火呼童澗底擔泉過量何分七碗貪杯笑倒玉川雪和尚語錄跋夫弘法為人非細事也必須行解相應事理函蓋始堪是任不然則山雞鳳冠虛妄之流耳善丙子冬出嶺參叩得侍雪老人之側見其操行端方應機圓活或隱或顯人莫測其涯涘但愧緣慳僅一寒暑而老人西邁矣彼時見其語錄散漫欲為編輯而力有未逮至戊子春又聞博山經房已罹回祿板盡化于灰燼至今九載未有修復因追繹老人所說之法玉瑩珠迴堪為後來龜鑑詎可任其湮沒弗傳乎於是不揣鄙劣將五會之語編而輯之分為類者九為卷者六付之剞劂用貽同志聊比書紳云爾歲次丙申仲春中浣侍者傳善稽首謹跋
